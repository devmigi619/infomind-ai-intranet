spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:infomind}
    username: ${DB_USERNAME:infomind}
    password: ${DB_PASSWORD:infomind}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

server:
  port: 8080

# 첨부파일 공통 설정 (공통). storage-path 등 환경별 값은 application-{profile}.yml에서 오버라이드.
attachment:
  max-file-size: 50MB
  max-group-size: 200MB
  blob-threshold: 5MB
  allowed-extensions:
    - jpg
    - jpeg
    - png
    - gif
    - webp
    - pdf
    - doc
    - docx
    - xls
    - xlsx
    - ppt
    - pptx
    - txt
    - zip

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters}
  expiry-hours: ${JWT_EXPIRY_HOURS:8}
  refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:30}

fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8000}

logging:
  level:
    com.infomind: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE