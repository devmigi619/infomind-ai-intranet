spring:
  datasource:
    url: jdbc:h2:mem:infomind;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# 로컬 개발용 더미 값. 운영 시크릿은 절대 여기 두지 말 것.
# 운영기는 application-prod.yml + 환경변수 ${JWT_SECRET} 사용.
jwt:
  secret: local-dev-secret-key-must-be-at-least-32-characters
  expiry-hours: 8
