events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # 업무 API → Spring Boot
        location /api/ {
            proxy_pass http://spring-boot:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI 채팅 API → FastAPI (SSE 스트리밍 지원)
        location /ai/ {
            proxy_pass http://fastapi:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # SSE 스트리밍을 위해 버퍼링 비활성화
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # 프론트엔드 → Expo 웹 빌드 (prod) 또는 dev 서버
        location / {
            proxy_pass http://spring-boot:8080;  # prod: 정적파일 서빙으로 변경 예정
            proxy_set_header Host $host;
        }
    }
}
