<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Infomind — 08b. RP 홈 탭 (모델 B: 카드형 위젯)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  font-weight: 300;
  background: #F9F9F9;
  color: #000;
  min-width: 1280px;
  -webkit-font-smoothing: antialiased;
}
button, input, textarea { font-family: inherit; }
svg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ===== Layout ===== */
.app {
  display: grid;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}
.body {
  display: grid;
  grid-template-columns: 64px 1fr 360px;
  height: calc(100vh - 48px);
  overflow: hidden;
}

/* ===== TopHeader ===== */
.top-header {
  display: flex;
  align-items: center;
  padding: 0 16px 0 20px;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  gap: 16px;
  position: relative;
  z-index: 100;
}
.brand {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: #000;
  user-select: none;
  flex-shrink: 0;
}
.search-bar {
  flex: 1;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  opacity: 0.5;
}
.search-bar input {
  width: 100%;
  height: 32px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 0 16px 0 40px;
  background: #F0F0F0;
  font-size: 13px;
  color: rgba(0,0,0,0.45);
  font-family: inherit;
}
.search-bar svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: rgba(0,0,0,0.3);
}
.top-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.icon-btn {
  width: 32px; height: 32px;
  border: none;
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(0,0,0,0.6);
}
.icon-btn:hover { background: rgba(0,0,0,0.04); }
.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #0A2463;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  margin-left: 4px;
}

/* ===== NavRail ===== */
.nav-rail {
  background: #fff;
  border-right: 1px solid rgba(0,0,0,0.08);
  padding: 12px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
}
.nav-item {
  width: 48px; height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  cursor: pointer;
  color: rgba(0,0,0,0.35);
  transition: all 0.15s;
}
.nav-item:hover { background: rgba(10,36,99,0.04); color: rgba(0,0,0,0.6); }
.nav-divider {
  width: 32px; height: 1px;
  background: rgba(0,0,0,0.08);
  margin: 4px 0;
}
.nav-item svg { width: 20px; height: 20px; }

/* ===== Main (Chat) ===== */
.main {
  display: flex;
  flex-direction: column;
  background: #fff;
  border-right: 1px solid rgba(0,0,0,0.06);
  overflow: hidden;
}
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 8px;
}
.welcome-icon {
  width: 64px; height: 64px;
  border-radius: 20px;
  background: rgba(10,36,99,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0A2463;
  margin-bottom: 12px;
}
.welcome-icon svg { width: 28px; height: 28px; }
.welcome-title { font-size: 22px; font-weight: 500; color: #000; }
.welcome-sub { font-size: 14px; color: rgba(0,0,0,0.5); }
.chat-input-wrap {
  padding: 16px 24px 20px;
  border-top: 1px solid rgba(0,0,0,0.06);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  border: 1px solid rgba(0,0,0,0.10);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  height: 42px;
  color: rgba(0,0,0,0.35);
  background: #fff;
  font-family: inherit;
}
.send-btn {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: #0A2463;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  flex-shrink: 0;
}
.send-btn svg { width: 16px; height: 16px; }

/* ===== Right Panel ===== */
.right-panel {
  background: #FAFAFA;
  display: flex;
  flex-direction: column;
  border-left: 1px solid rgba(0,0,0,0.08);
  overflow: hidden;
}

/* RP 탭 헤더 — RightPanel.tsx 그대로 */
.rp-tabs {
  display: flex;
  align-items: center;
  padding: 12px 16px 0;
  gap: 4px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.rp-tab {
  width: 36px; height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  color: rgba(0,0,0,0.4);
  position: relative;
  margin-bottom: -1px;
  transition: background 0.12s;
}
.rp-tab:hover { background: rgba(0,0,0,0.04); }
.rp-tab.active {
  background: rgba(10,36,99,0.08);
  color: #0A2463;
}
.rp-tab.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px; height: 2px;
  background: #0A2463;
  border-radius: 1px;
}
.rp-tab-divider {
  width: 1px; height: 16px;
  background: rgba(0,0,0,0.10);
  margin: 0 4px 8px;
}
.rp-tab svg { width: 18px; height: 18px; }

/* ===== RP 홈 콘텐츠 (카드형 위젯) ===== */
.rp-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.rp-scroll::-webkit-scrollbar { width: 4px; }
.rp-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

/* 2열 그리드 행 */
.widget-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* 공통 카드 */
.wcard {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.14s;
  position: relative;
  overflow: hidden;
}
.wcard:hover {
  border-color: rgba(0,0,0,0.13);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transform: translateY(-1px);
}

/* 미니 통계 카드 레이아웃 */
.wcard-label {
  font-size: 11px;
  color: rgba(0,0,0,0.45);
  font-weight: 400;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.wcard-label svg { width: 12px; height: 12px; }
.wcard-num {
  font-size: 26px;
  font-weight: 600;
  color: #000;
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.wcard-sub {
  font-size: 11px;
  color: rgba(0,0,0,0.45);
  line-height: 1.4;
}

/* 색상 강조 줄 (카드 상단) */
.wcard-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 12px 12px 0 0;
}
.accent-amber { background: #F59E0B; }
.accent-blue  { background: #0A2463; }
.accent-green { background: #10B981; }
.accent-red   { background: #EF4444; }

/* 상태 행 (올린결재 내 카드) */
.wcard-stat-row {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}
.wstat {
  display: flex;
  align-items: center;
  gap: 4px;
}
.wstat-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}
.wsd-yellow { background: #F59E0B; }
.wsd-green  { background: #10B981; }
.wsd-red    { background: #EF4444; }
.wstat-text {
  font-size: 11px;
  color: rgba(0,0,0,0.55);
}
.wstat-text strong {
  font-weight: 600;
  color: rgba(0,0,0,0.8);
}

/* 연차 카드 — 프로그레스바 */
.wcard-progress {
  margin-top: 8px;
  height: 4px;
  background: rgba(0,0,0,0.07);
  border-radius: 2px;
  overflow: hidden;
}
.wcard-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: #10B981;
}

/* 주간보고 카드 — D-day 강조 */
.wcard-dday {
  font-size: 22px;
  font-weight: 700;
  color: #EF4444;
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.wcard-dday-sub {
  font-size: 11px;
  color: rgba(0,0,0,0.45);
}

/* 풀폭 카드 */
.wcard-full {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  padding: 14px;
}
.wfull-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.wfull-title {
  font-size: 12px;
  font-weight: 500;
  color: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  gap: 5px;
}
.wfull-title svg { width: 13px; height: 13px; }
.wfull-more {
  font-size: 11px;
  color: rgba(0,0,0,0.35);
  cursor: pointer;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0;
}
.wfull-more:hover { color: #0A2463; }
.wfull-more svg { width: 11px; height: 11px; }

/* 일정 카드 아이템 */
.sched-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.sched-item:last-child { border-bottom: none; padding-bottom: 0; }
.sched-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sdot-blue  { background: #0A2463; }
.sdot-green { background: #10B981; }
.sdot-amber { background: #F59E0B; }
.sched-time {
  font-size: 11px;
  color: rgba(0,0,0,0.40);
  flex-shrink: 0;
  width: 34px;
}
.sched-name {
  font-size: 12px;
  color: rgba(0,0,0,0.75);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sched-loc {
  font-size: 10px;
  color: rgba(0,0,0,0.35);
  flex-shrink: 0;
}

/* 공지 카드 아이템 */
.notice-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  cursor: pointer;
}
.notice-item:hover .notice-title { color: #0A2463; }
.notice-item:last-child { border-bottom: none; padding-bottom: 0; }
.notice-bullet {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(0,0,0,0.25);
  flex-shrink: 0;
  margin-top: 6px;
}
.notice-inner { flex: 1; min-width: 0; }
.notice-title {
  font-size: 12px;
  color: rgba(0,0,0,0.75);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.12s;
}
.notice-meta {
  font-size: 10px;
  color: rgba(0,0,0,0.38);
  margin-top: 2px;
}

/* 빠른 액션 카드 */
.qa-header {
  font-size: 11px;
  font-weight: 500;
  color: rgba(0,0,0,0.40);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.qa-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.qa-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 10px 6px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.08);
  background: #FAFAFA;
  cursor: pointer;
  transition: all 0.12s;
}
.qa-btn.active {
  background: rgba(10,36,99,0.05);
  border-color: rgba(10,36,99,0.18);
}
.qa-btn.active:hover {
  background: rgba(10,36,99,0.09);
  border-color: rgba(10,36,99,0.25);
}
.qa-btn.inactive {
  opacity: 0.5;
  cursor: default;
}
.qa-icon {
  width: 26px; height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qa-icon svg { width: 16px; height: 16px; }
.qa-btn.active .qa-icon { color: #0A2463; }
.qa-btn.inactive .qa-icon { color: rgba(0,0,0,0.45); }
.qa-label {
  font-size: 11px;
  font-weight: 400;
  text-align: center;
  line-height: 1.3;
}
.qa-btn.active .qa-label { color: #0A2463; font-weight: 500; }
.qa-btn.inactive .qa-label { color: rgba(0,0,0,0.5); }
.qa-soon {
  font-size: 10px;
  color: rgba(0,0,0,0.3);
}

/* 새 공지 배지 */
.new-badge {
  display: inline-flex;
  align-items: center;
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 500;
  background: rgba(239,68,68,0.10);
  color: #DC2626;
  margin-left: 4px;
}
</style>
</head>
<body>
<div class="app">

  <!-- TopHeader -->
  <header class="top-header">
    <span class="brand">infomind</span>
    <div class="search-bar">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="검색..." readonly>
    </div>
    <div class="top-actions">
      <button class="icon-btn" title="알림">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <div class="avatar">김</div>
    </div>
  </header>

  <div class="body">
    <!-- NavRail -->
    <nav class="nav-rail">
      <div class="nav-item" title="AI 채팅">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="nav-item" title="전자결재">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="nav-item" title="게시판">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item" title="주간보고">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="nav-item" title="캘린더">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
    </nav>

    <!-- Main Chat Area -->
    <main class="main">
      <div class="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div class="welcome-title">안녕하세요, 김민기님</div>
        <div class="welcome-sub">무엇이든 물어보세요</div>
      </div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" placeholder="메시지를 입력하세요..." readonly></textarea>
        <button class="send-btn">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>

    <!-- Right Panel -->
    <aside class="right-panel">

      <!-- 탭 헤더 -->
      <div class="rp-tabs">
        <div class="rp-tab active" title="대시보드">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </div>
        <div class="rp-tab-divider"></div>
        <div class="rp-tab" title="AI 어시스턴트">
          <svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/><path d="M20 3v4"/><path d="M22 5h-4"/></svg>
        </div>
      </div>

      <!-- 위젯 그리드 스크롤 영역 -->
      <div class="rp-scroll">

        <!-- 1행: 받은 결재 + 올린 결재 -->
        <div class="widget-row">
          <!-- 받은 결재 -->
          <div class="wcard">
            <div class="wcard-accent accent-amber"></div>
            <div class="wcard-label">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              받은 결재
            </div>
            <div class="wcard-num">5</div>
            <div class="wcard-sub">내 승인 필요</div>
          </div>
          <!-- 올린 결재 -->
          <div class="wcard">
            <div class="wcard-accent accent-blue"></div>
            <div class="wcard-label">
              <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              올린 결재
            </div>
            <div class="wcard-num">4</div>
            <div class="wcard-stat-row">
              <div class="wstat">
                <div class="wstat-dot wsd-yellow"></div>
                <span class="wstat-text">진행 <strong>3</strong></span>
              </div>
              <div class="wstat">
                <div class="wstat-dot wsd-green"></div>
                <span class="wstat-text">승인 <strong>1</strong></span>
              </div>
            </div>
          </div>
        </div>

        <!-- 2행: 오늘 일정 + 남은 연차 -->
        <div class="widget-row">
          <!-- 오늘 일정 -->
          <div class="wcard">
            <div class="wcard-accent accent-blue"></div>
            <div class="wcard-label">
              <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              오늘 일정
            </div>
            <div class="wcard-num">3</div>
            <div class="wcard-sub">회의 포함</div>
          </div>
          <!-- 남은 연차 -->
          <div class="wcard">
            <div class="wcard-accent accent-green"></div>
            <div class="wcard-label">
              <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              남은 연차
            </div>
            <div class="wcard-num">8.5</div>
            <div class="wcard-progress">
              <div class="wcard-progress-fill" style="width:57%"></div>
            </div>
            <div class="wcard-sub" style="margin-top:5px;">/ 15일</div>
          </div>
        </div>

        <!-- 3행: 주간보고 + 새 공지 -->
        <div class="widget-row">
