<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Infomind — 05a. 기본 상태 (채팅 풀폭)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  font-weight: 300;
  background: #F9F9F9;
  color: #000;
  -webkit-font-smoothing: antialiased;
  min-width: 1280px;
}
button, input, textarea { font-family: inherit; }
svg { stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* ===== Layout ===== */
.app {
  display: grid;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}
.body {
  display: grid;
  /* NavRail 60px | 채팅 풀폭 */
  grid-template-columns: 60px 1fr;
  height: calc(100vh - 48px);
  overflow: hidden;
}

/* ===== TopHeader ===== */
.top-header {
  display: flex;
  align-items: center;
  padding: 0 16px 0 20px;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  gap: 16px;
}
.brand {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: #000;
  user-select: none;
  flex-shrink: 0;
}
.search-bar {
  flex: 1;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  opacity: 0.45;
}
.search-bar input {
  width: 100%;
  height: 32px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 0 72px 0 40px;
  background: #F0F0F0;
  font-size: 13px;
  color: rgba(0,0,0,0.45);
  cursor: not-allowed;
  font-family: inherit;
  outline: none;
}
.search-bar svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: rgba(0,0,0,0.3);
}
.search-bar .preparing-tag {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: rgba(0,0,0,0.35);
  letter-spacing: 0.04em;
}
.top-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.icon-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: rgba(0,0,0,0.6);
}
.icon-btn:hover { background: rgba(0,0,0,0.04); }
.dot {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #EF4444;
}
.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #0A2463;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  margin-left: 4px;
  flex-shrink: 0;
}

/* ===== NavRail ===== */
.nav-rail {
  width: 60px;
  background: #fff;
  border-right: 1px solid rgba(0,0,0,0.08);
  padding: 12px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
}
.nav-item {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  color: rgba(0,0,0,0.55);
  transition: background 0.15s, color 0.15s;
}
.nav-item:hover { background: rgba(10,36,99,0.04); color: #0A2463; }
.nav-item.active {
  background: rgba(10,36,99,0.08);
  color: #0A2463;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 12px;
  bottom: 12px;
  width: 2px;
  background: #0A2463;
  border-radius: 0 2px 2px 0;
}
.nav-item .badge {
  position: absolute;
  top: 6px;
  right: 6px;
  background: #EF4444;
  color: #fff;
  font-size: 9px;
  font-weight: 600;
  padding: 1px 4px;
  border-radius: 8px;
  min-width: 14px;
  text-align: center;
}
.nav-divider {
  width: 32px;
  height: 1px;
  background: rgba(0,0,0,0.08);
  margin: 4px 0;
}

/* ===== Chat Area (fullwidth) ===== */
.chat-area {
  display: flex;
  flex-direction: column;
  background: #fff;
  overflow: hidden;
  border-left: none;
}

/* Welcome screen — ChatGPT style: centered, max-width 760px */
.chat-welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px 24px;
  overflow-y: auto;
}
.chat-welcome-inner {
  width: 100%;
  max-width: 760px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.greet-heading {
  font-size: 28px;
  font-weight: 500;
  color: #000;
  margin-bottom: 4px;
  text-align: center;
}
.greet-sub {
  font-size: 14px;
  color: rgba(0,0,0,0.55);
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.5;
}
.prompt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
}
.prompt-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-align: left;
  font-family: inherit;
  font-size: 14px;
  color: rgba(0,0,0,0.85);
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.prompt-card:hover { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.14); }
.prompt-card-icon {
  font-size: 18px;
  line-height: 1;
}
.prompt-card-text {
  font-size: 13px;
  color: rgba(0,0,0,0.7);
}

/* Messages area */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 32px 24px;
  display: none;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}
.messages-inner {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.app.chat-active .chat-welcome { display: none; }
.app.chat-active .messages { display: flex; }

.msg-row { display: flex; }
.msg-row.user { justify-content: flex-end; }
.msg-row.ai { justify-content: flex-start; }

.msg {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
}
.msg.user {
  background: #0A2463;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.ai {
  background: #F5F5F5;
  color: #000;
  border-top-left-radius: 4px;
}

/* Thinking dots */
.thinking {
  display: inline-flex;
  gap: 4px;
  padding: 14px 18px;
  background: #F5F5F5;
  border-radius: 16px;
  border-top-left-radius: 4px;
}
.thinking span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(0,0,0,0.35);
  animation: dot 1.4s infinite ease-in-out;
}
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
  40% { opacity: 1; transform: scale(1); }
}

/* Input bar */
.chat-input-wrap {
  flex-shrink: 0;
  padding: 0 24px 24px;
  position: relative;
}
.chat-input-wrap::before {
  content: '';
  position: absolute;
  top: -28px;
  left: 0;
  right: 0;
  height: 28px;
  background: linear-gradient(to bottom, transparent, #fff);
  pointer-events: none;
}
.chat-input-inner {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
}
.chat-input-bar {
  display: flex;
  align-items: center;
  height: 44px;
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 22px;
  padding: 0 6px 0 20px;
  background: #fff;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.chat-input-bar:focus-within {
  border-color: rgba(10,36,99,0.4);
  box-shadow: 0 0 0 3px rgba(10,36,99,0.08);
}
.chat-input-bar input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 14px;
  color: #000;
}
.chat-input-bar input::placeholder { color: rgba(0,0,0,0.3); }
.send-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #0A2463;
  color: #fff;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.send-btn:hover { background: #082052; }

/* ===== Demo Label ===== */
.demo-label {
  position: fixed;
  top: 56px;
  right: 12px;
  background: rgba(10,36,99,0.9);
  color: #fff;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.04em;
  z-index: 9999;
  pointer-events: none;
}
.demo-note {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: rgba(255,255,255,0.75);
  font-size: 11px;
  padding: 8px 16px;
  border-radius: 20px;
  z-index: 9999;
  pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- TopHeader — RP 토글 버튼 없음, 알림 벨 + 아바타만 -->
  <header class="top-header">
    <div class="brand">Infomind</div>

    <div class="search-bar">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="통합검색 준비 중..." disabled />
      <span class="preparing-tag">준비 중</span>
    </div>

    <div class="top-actions">
      <button class="icon-btn" title="알림">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="dot"></span>
      </button>
      <div class="avatar">관</div>
    </div>
  </header>

  <div class="body">

    <!-- NavRail — 아무 메뉴도 활성 안됨 -->
    <nav class="nav-rail">
      <!-- 홈 (비활성) -->
      <div class="nav-item" title="홈">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V21H3z"/><path d="M9 21V12h6v9"/></svg>
      </div>
      <div class="nav-divider"></div>
      <!-- 핀 메뉴 4개 -->
      <div class="nav-item" title="게시판">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9h10M7 13h10M7 17h6"/></svg>
      </div>
      <div class="nav-item" title="전자결재">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 15l2 2 4-4"/></svg>
        <span class="badge">2</span>
      </div>
      <div class="nav-item" title="주간보고">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h8M8 9h2"/></svg>
      </div>
      <div class="nav-item" title="캘린더">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </div>
      <!-- 더보기 -->
      <div class="nav-item" title="더보기" style="margin-top: auto; margin-bottom: 4px;">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke-width="2"><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
      </div>
    </nav>

    <!-- Chat Area (풀폭) -->
    <div class="chat-area">

      <!-- Welcome (기본 상태) -->
      <div class="chat-welcome" id="chat-welcome">
        <div class="chat-welcome-inner">
          <div class="greet-heading">👋 안녕하세요, 관리자님</div>
          <div class="greet-sub">결재·게시판·주간보고를 자연어로 처리할 수 있어요</div>
          <div class="prompt-grid">
            <button class="prompt-card">
              <span class="prompt-card-icon">📋</span>
              <span class="prompt-card-text">이번 주 결재 대기 알려줘</span>
            </button>
            <button class="prompt-card">
              <span class="prompt-card-icon">📅</span>
              <span class="prompt-card-text">오늘 일정 확인해줘</span>
            </button>
            <button class="prompt-card">
              <span class="prompt-card-icon">📝</span>
              <span class="prompt-card-text">주간보고 초안 채워줘</span>
            </button>
            <button class="prompt-card">
              <span class="prompt-card-icon">📢</span>
              <span class="prompt-card-text">최근 공지사항 요약해줘</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Messages (채팅 진행 시) -->
      <div class="messages" id="messages">
        <div class="messages-inner" id="messages-inner"></div>
      </div>

      <!-- Input bar -->
      <div class="chat-input-wrap">
        <div class="chat-input-inner">
          <div class="chat-input-bar">
            <input type="text" id="chat-input" placeholder="무엇이든 물어보세요" />
            <button class="send-btn" id="send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div><!-- /chat-area -->

  </div><!-- /body -->

</div><!-- /app -->

<!-- 화면 설명 레이블 -->
<div class="demo-label">05a — 기본 상태: 채팅 풀폭</div>
<div class="demo-note">NavRail 메뉴 클릭 → 모듈 활성(05b 참고) · 홈 클릭 → 대시보드(05c 참고)</div>

<script>
const app = document.getElementById('app');
const welcomeEl = document.getElementById('chat-welcome');
const messagesEl = document.getElementById('messages');
const messagesInner = document.getElementById('messages-inner');
const inputEl = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

function addMsg(type, text) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + type;
  const bubble = document.createElement('div');
  bubble.className = 'msg ' + type;
  bubble.textContent = text;
  row.appendChild(bubble);
  messagesInner.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function addThinking() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
  messagesInner.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';

  if (!app.classList.contains('chat-active')) {
    app.classList.add('chat-active');
  }

  addMsg('user', text);

  const thinkRow = addThinking();
  setTimeout(() => {
    thinkRow.remove();
    const aiText = 'AI가 처리 중입니다. 잠시 후 결과를 알려드릴게요.';
    addMsg('ai', aiText);
  }, 1400);
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// Prompt cards click
document.querySelectorAll('.prompt-card').forEach((card) => {
  card.addEventListener('click', () => {
    inputEl.value = card.querySelector('.prompt-card-text').textContent;
    inputEl.focus();
    send();
  });
});
</script>

</body>
</html>
