<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infomind — 11e. 자비스 인라인 칩 안</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  font-weight: 300;
  background: #D0D0D0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 0;
  -webkit-font-smoothing: antialiased;
}
button, input, textarea { font-family: inherit; }
svg { stroke: currentColor; fill: none; stroke-linejoin: round; stroke-linecap: round; }

/* ===== 폰 프레임 ===== */
.phone-frame {
  position: relative;
  width: 375px;
  height: 812px;
  background: #fff;
  border-radius: 48px;
  box-shadow:
    0 0 0 2px #555,
    0 0 0 10px #1c1c1e,
    0 0 0 12px #2c2c2e,
    0 40px 100px rgba(0,0,0,0.55);
  overflow: hidden;
  flex-shrink: 0;
}
/* 노치 */
.phone-frame::before {
  content: '';
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 34px;
  background: #1c1c1e;
  border-radius: 20px;
  z-index: 9999;
}

/* ===== 앱 루트 ===== */
.app {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: #F9F9F9;
  overflow: hidden;
}

/* ===== TopHeader ===== */
.top-header {
  flex-shrink: 0;
  padding-top: 54px;
  height: 110px;
  display: flex;
  align-items: flex-end;
  padding-bottom: 0;
  padding-left: 16px;
  padding-right: 16px;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  position: relative;
  z-index: 200;
}
.header-inner {
  display: flex;
  align-items: center;
  width: 100%;
  height: 56px;
  gap: 6px;
}
.icon-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: transparent;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(0,0,0,0.65);
  transition: background 140ms;
  flex-shrink: 0;
}
.icon-btn:hover { background: rgba(0,0,0,0.06); }
.header-brand {
  flex: 1;
  text-align: center;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: #000;
  user-select: none;
}
.header-right { display: flex; align-items: center; gap: 2px; }
.notif-wrap { position: relative; }
.notif-badge {
  position: absolute;
  top: 5px; right: 5px;
  width: 7px; height: 7px;
  background: #EF4444;
  border-radius: 50%;
  border: 1.5px solid #fff;
}
.avatar-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #0A2463;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: 700;
  letter-spacing: 0.03em;
  flex-shrink: 0; margin-left: 2px;
}

/* ===== 메인 통합 스크롤 영역 ===== */
.main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
}

/* ===== 대시보드 섹션 ===== */
.dashboard-section {
  padding: 14px 16px 0;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  color: rgba(0,0,0,0.32);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-left: 2px;
}

/* 위젯 카드 */
.widget-cards { display: flex; flex-direction: column; gap: 8px; }
.widget-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  cursor: pointer;
  transition: box-shadow 160ms, border-color 160ms;
  -webkit-tap-highlight-color: transparent;
  min-height: 64px;
}
.widget-card:hover {
  border-color: rgba(10,36,99,0.18);
  box-shadow: 0 3px 12px rgba(10,36,99,0.08);
}
.widget-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.wi-blue { background: rgba(10,36,99,0.07); }
.wi-green { background: rgba(16,185,129,0.10); }
.wi-amber { background: rgba(245,158,11,0.10); }
.wi-red { background: rgba(239,68,68,0.09); }
.widget-body { flex: 1; }
.widget-title { font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.65); margin-bottom: 2px; }
.widget-value { font-size: 18px; font-weight: 700; color: #000; line-height: 1.2; }
.widget-unit { font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.45); margin-left: 2px; }
.widget-chevron { color: rgba(0,0,0,0.2); flex-shrink: 0; }

/* ===== 구분선 ===== */
.divider {
  margin: 16px 16px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.divider-line { flex: 1; height: 1px; background: rgba(0,0,0,0.07); }
.divider-label {
  font-size: 10px;
  font-weight: 600;
  color: rgba(0,0,0,0.25);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ===== 채팅 영역 ===== */
.chat-section {
  padding: 14px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* 메시지 공통 */
.msg-row {
  display: flex;
  gap: 8px;
}
.msg-row.user { justify-content: flex-end; }
.msg-row.ai { justify-content: flex-start; flex-direction: column; }

/* AI 아바타 */
.ai-avatar {
  width: 28px; height: 28px;
  border-radius: 9px;
  background: #0A2463;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-bottom: auto;
}

.ai-msg-group {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

/* 말풍선 */
.bubble {
  max-width: 240px;
  padding: 9px 13px;
  border-radius: 16px;
  font-size: 13px;
  line-height: 1.55;
}
.bubble.user {
  background: #0A2463;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble.ai {
  background: #fff;
  color: rgba(0,0,0,0.85);
  border: 1px solid rgba(0,0,0,0.08);
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.msg-time {
  font-size: 10px;
  color: rgba(0,0,0,0.28);
  margin-top: 3px;
  padding: 0 2px;
  align-self: flex-end;
}
.msg-row.user .msg-time { text-align: right; }

/* ===== 인라인 칩 행 ===== */
.chips-row {
  margin-top: 7px;
  margin-left: 36px; /* ai-avatar 폭 + gap */
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 32px;
  padding: 0 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid;
  transition: background 140ms, box-shadow 140ms;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  user-select: none;
}
/* 액션 칩 — brand 색상 */
.chip.action {
  border-color: rgba(10,36,99,0.28);
  color: #0A2463;
  background: rgba(10,36,99,0.04);
}
.chip.action:hover {
  background: rgba(10,36,99,0.09);
  box-shadow: 0 2px 8px rgba(10,36,99,0.12);
}
.chip.action:active { background: rgba(10,36,99,0.14); }
/* 정보 칩 — 회색 */
.chip.info {
  border-color: rgba(0,0,0,0.15);
  color: rgba(0,0,0,0.55);
  background: transparent;
}
.chip.info:hover { background: rgba(0,0,0,0.04); }
/* 현황 칩 — 숫자 강조 */
.chip.stat {
  border-color: rgba(0,0,0,0.12);
  color: rgba(0,0,0,0.65);
  background: #F9F9F9;
}
.chip.stat .stat-num {
  font-size: 13px;
  font-weight: 700;
  color: #000;
}
.chip-arrow {
  font-size: 11px;
  opacity: 0.7;
}

/* ===== 채팅 입력바 ===== */
.chat-input-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px 10px;
  background: #fff;
  border-top: 1px solid rgba(0,0,0,0.08);
  position: relative;
  z-index: 150;
}
.chat-input {
  flex: 1;
  height: 40px;
  border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 20px;
  padding: 0 14px;
  font-size: 14px;
  background: #F9F9F9;
  color: #000;
  outline: none;
  transition: border-color 150ms, background 150ms;
}
.chat-input:focus { border-color: rgba(10,36,99,0.32); background: #fff; }
.chat-input::placeholder { color: rgba(0,0,0,0.32); }
.send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #0A2463;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
  transition: opacity 150ms;
}
.send-btn:hover { opacity: 0.85; }

/* ===== 하단 탭바 ===== */
.bottom-nav {
  flex-shrink: 0;
  height: 64px;
  background: #fff;
  border-top: 1px solid rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding-bottom: 4px;
  position: relative;
  z-index: 300;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 6px 0;
  border: none; background: transparent;
  cursor: pointer;
  color: rgba(0,0,0,0.36);
  transition: color 160ms;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.tab-item.active { color: #0A2463; }
.tab-item svg { width: 22px; height: 22px; }
.tab-label { font-size: 10px; font-weight: 500; }
.tab-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 28px; height: 2.5px;
  background: #0A2463;
  border-radius: 0 0 3px 3px;
}

/* ===== 토스트 ===== */
.toast {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.76);
  color: #fff;
  font-size: 11px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 24px;
  white-space: nowrap;
  z-index: 9000;
  opacity: 1;
  transition: opacity 600ms ease;
  pointer-events: none;
  text-align: center;
  line-height: 1.5;
  max-width: 300px;
  white-space: normal;
}
.toast.fade { opacity: 0; }

/* ===== 심플 입력 시뮬 ===== */
.input-hint {
  position: absolute;
  bottom: 138px;
  left: 16px;
  right: 16px;
  background: rgba(10,36,99,0.06);
  border: 1px solid rgba(10,36,99,0.15);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 11px;
  color: rgba(10,36,99,0.7);
  z-index: 400;
  pointer-events: none;
  opacity: 1;
  transition: opacity 400ms;
}
.input-hint.fade { opacity: 0; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app">

    <!-- ① TopHeader -->
    <header class="top-header">
      <div class="header-inner">
        <button class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 20 20">
            <line x1="3" y1="6" x2="17" y2="6" stroke-width="1.5"/>
            <line x1="3" y1="10" x2="17" y2="10" stroke-width="1.5"/>
            <line x1="3" y1="14" x2="17" y2="14" stroke-width="1.5"/>
          </svg>
        </button>
        <span class="header-brand">Infomind</span>
        <div class="header-right">
          <div class="notif-wrap">
            <button class="icon-btn">
              <svg width="19" height="19" viewBox="0 0 19 19">
                <path d="M9.5 2a5.5 5.5 0 0 1 5.5 5.5v3l1.4 2.5H2.6L4 10.5V7.5A5.5 5.5 0 0 1 9.5 2Z" stroke-width="1.4"/>
                <path d="M7.5 15.5a2 2 0 0 0 4 0" stroke-width="1.4"/>
              </svg>
            </button>
            <span class="notif-badge"></span>
          </div>
          <button class="avatar-btn">MK</button>
        </div>
      </div>
    </header>

    <!-- ② 메인 통합 스크롤 -->
    <main class="main" id="mainScroll">

      <!-- 대시보드 위젯 섹션 -->
      <div class="dashboard-section">
        <div class="section-label">대시보드</div>
        <div class="widget-cards">
          <div class="widget-card" onclick="alert('전자결재 화면으로 이동')">
            <div class="widget-icon wi-blue">📋</div>
            <div class="widget-body">
              <div class="widget-title">받은 결재</div>
              <div class="widget-value">5<span class="widget-unit">건 대기 중</span></div>
            </div>
            <svg class="widget-chevron" width="16" height="16" viewBox="0 0 16 16"><polyline points="6,4 10,8 6,12" stroke-width="1.5"/></svg>
          </div>
          <div class="widget-card" onclick="alert('캘린더 화면으로 이동')">
            <div class="widget-icon wi-green">📅</div>
            <div class="widget-body">
              <div class="widget-title">오늘 일정</div>
              <div class="widget-value">3<span class="widget-unit">건 / 다음: 10:00</span></div>
            </div>
            <svg class="widget-chevron" width="16" height="16" viewBox="0 0 16 16"><polyline points="6,4 10,8 6,12" stroke-width="1.5"/></svg>
          </div>
          <div class="widget-card" onclick="alert('연차 현황 화면으로 이동')">
            <div class="widget-icon wi-amber">🌴</div>
            <div class="widget-body">
              <div class="widget-title">남은 연차</div>
              <div class="widget-value">8.5<span class="widget-unit">일</span></div>
            </div>
            <svg class="widget-chevron" width="16" height="16" viewBox="0 0 16 16"><polyline points="6,4 10,8 6,12" stroke-width="1.5"/></svg>
          </div>
          <div class="widget-card" onclick="alert('공지사항 화면으로 이동')">
            <div class="widget-icon wi-red">📢</div>
            <div class="widget-body">
              <div class="widget-title">새 공지</div>
              <div class="widget-value">2<span class="widget-unit">건</span></div>
            </div>
            <svg class="widget-chevron" width="16" height="16" viewBox="0 0 16 16"><polyline points="6,4 10,8 6,12" stroke-width="1.5"/></svg>
          </div>
        </div>
      </div>

      <!-- 구분선 -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-label">AI 대화</span>
        <div class="divider-line"></div>
      </div>

      <!-- 채팅 영역 -->
      <div class="chat-section">

        <!-- 사용자 메시지 -->
        <div class="msg-row user">
          <div>
            <div class="bubble user">휴가 신청해줘</div>
            <div class="msg-time">오전 9:42</div>
          </div>
        </div>

        <!-- AI 응답 + 인라인 칩 -->
        <div class="msg-row ai">
          <div class="ai-msg-group">
            <div class="ai-avatar">
              <svg width="15" height="15" viewBox="0 0 15 15" stroke="#fff" stroke-width="1.5" fill="none">
                <circle cx="7.5" cy="7.5" r="5.5"/>
                <path d="M4.5 7.5c0-1.66 1.34-3 3-3s3 1.34 3 3"/>
                <line x1="7.5" y1="7.5" x2="7.5" y2="10"/>
              </svg>
            </div>
            <div>
              <div class="bubble ai">언제 쓰실 건가요?</div>
              <div class="msg-time">오전 9:42</div>
            </div>
          </div>

          <!-- 인라인 칩 행 -->
          <div class="chips-row">
            <!-- 액션 칩 -->
            <button class="chip action" onclick="alert('전자결재 → 휴가신청서 화면으로 이동합니다')">
              <span>💼</span>
              <span>휴가 결재 쓰러가기</span>
              <span class="chip-arrow">→</span>
            </button>
            <!-- 정보 칩 -->
            <button class="chip info" onclick="alert('휴가규정 안내\n\n연차휴가는 입사 1년 후 15일 부여되며, 매년 1일씩 가산됩니다.')">
              <span>📖</span>
              <span>휴가규정</span>
            </button>
            <!-- 현황 칩 -->
            <button class="chip stat" onclick="alert('잔여 연차 현황\n\n사용: 3.5일 / 총 12일\n잔여: 8.5일')">
              <span class="stat-num">8.5</span>
              <span>일 남음</span>
            </button>
          </div>
        </div>

      </div>
    </main>

    <!-- ③ 채팅 입력바 -->
    <div class="chat-input-bar">
      <input class="chat-input" id="chatInput" type="text" placeholder="Infomind에게 질문하세요…">
      <button class="send-btn" onclick="sendMsg()">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="#fff" stroke-width="1.8">
          <path d="M2 15L15.5 8.5L2 2v5l9 1.5-9 1.5V15Z" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- ④ 하단 탭바 -->
    <nav class="bottom-nav">
      <button class="tab-item active" data-tab="home">
        <svg viewBox="0 0 22 22"><path d="M3 10L11 3l8 7V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V10Z" stroke-width="1.5"/><path d="M8 21v-7h6v7" stroke-width="1.5"/></svg>
        <span class="tab-label">홈</span>
      </button>
      <button class="tab-item" data-tab="board">
        <svg viewBox="0 0 22 22"><rect x="3" y="3" width="16" height="16" rx="2" stroke-width="1.5"/><line x1="7" y1="8" x2="15" y2="8" stroke-width="1.5"/><line x1="7" y1="11.5" x2="13" y2="11.5" stroke-width="1.5"/><line x1="7" y1="15" x2="10" y2="15" stroke-width="1.5"/></svg>
        <span class="tab-label">게시판</span>
      </button>
      <button class="tab-item" data-tab="approval">
        <svg viewBox="0 0 22 22"><path d="M6 2h10l4 4v15a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Z" stroke-width="1.5"/><polyline points="16,2 16,6 22,6" stroke-width="1.5"/><line x1="7" y1="11" x2="15" y2="11" stroke-width="1.5"/><line x1="7" y1="15" x2="11" y2="15" stroke-width="1.5"/></svg>
        <span class="tab-label">결재</span>
      </button>
      <button class="tab-item" data-tab="report">
        <svg viewBox="0 0 22 22"><rect x="3" y="4" width="16" height="16" rx="2" stroke-width="1.5"/><line x1="7" y1="2" x2="7" y2="6" stroke-width="1.5"/><line x1="15" y1="2" x2="15" y2="6" stroke-width="1.5"/><line x1="3" y1="10" x2="19" y2="10" stroke-width="1.5"/></svg>
        <span class="tab-label">주간보고</span>
      </button>
      <button class="tab-item" data-tab="more">
        <svg viewBox="0 0 22 22">
          <circle cx="5" cy="11" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="11" cy="11" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="17" cy="11" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
        <span class="tab-label">더보기</span>
      </button>
    </nav>

    <!-- 토스트 -->
    <div class="toast" id="toast">AI 응답 옆 작은 칩으로 액션.<br>채팅 흐름 자연스러움.</div>

  </div>
</div>

<script>
// 탭 전환
document.querySelectorAll('.tab-item').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});

// 토스트 5초 후 fade
setTimeout(() => {
  document.getElementById('toast').classList.add('fade');
}, 5000);

// 간단한 메시지 전송 시뮬
function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  const chatSection = document.querySelector('.chat-section');

  // 사용자 메시지 추가
  const userRow = document.createElement('div');
  userRow.className = 'msg-row user';
  userRow.innerHTML = `
    <div>
      <div class="bubble user">${escapeHtml(text)}</div>
      <div class="msg-time">방금 전</div>
    </div>
  `;
  chatSection.appendChild(userRow);

  input.value = '';

  // AI 응답 시뮬 (0.9초 후)
  setTimeout(() => {
    const aiRow = document.createElement('div');
    aiRow.className = 'msg-row ai';
    aiRow.innerHTML = `
      <div class="ai-msg-group">
        <div class="ai-avatar">
          <svg width="15" height="15" viewBox="0 0 15 15" stroke="#fff" stroke-width="1.5" fill="none">
            <circle cx="7.5" cy="7.5" r="5.5"/>
            <path d="M4.5 7.5c0-1.66 1.34-3 3-3s3 1.34 3 3"/>
            <line x1="7.5" y1="7.5" x2="7.5" y2="10"/>
          </svg>
        </div>
        <div>
          <div class="bubble ai">네, 도와드릴게요. 관련 메뉴로 안내해 드립니다.</div>
          <div class="msg-time">방금 전</div>
        </div>
      </div>
      <div class="chips-row">
        <button class="chip action" onclick="alert('관련 화면으로 이동합니다')">
          <span>✅</span>
          <span>바로 이동</span>
          <span class="chip-arrow">→</span>
        </button>
        <button class="chip info" onclick="alert('관련 정보를 확인합니다')">
          <span>📖</span>
          <span>도움말</span>
        </button>
      </div>
    `;
    chatSection.appendChild(aiRow);

    // 스크롤 하단으로
    const main = document.getElementById('mainScroll');
    main.scrollTop = main.scrollHeight;
  }, 900);

  // 스크롤
  const main = document.getElementById('mainScroll');
  setTimeout(() => { main.scrollTop = main.scrollHeight; }, 50);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Enter 키
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMsg();
});

// 초기 스크롤 — 위젯 상단에서 시작
document.getElementById('mainScroll').scrollTop = 0;
</script>
</body>
</html>
