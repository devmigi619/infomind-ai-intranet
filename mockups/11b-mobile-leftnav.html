<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infomind — 11b. 모바일 좌측 NavRail 유지 안</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  font-weight: 300;
  background: #D0D0D0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 0;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }
svg { stroke: currentColor; fill: none; stroke-linejoin: round; stroke-linecap: round; }

/* ===== 폰 프레임 ===== */
.phone-frame {
  position: relative;
  width: 375px;
  height: 812px;
  background: #fff;
  border-radius: 48px;
  box-shadow: 0 0 0 2px #555, 0 0 0 10px #1c1c1e, 0 40px 100px rgba(0,0,0,0.55);
  overflow: hidden;
}
.phone-frame::before {
  content: '';
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 34px;
  background: #1c1c1e;
  border-radius: 20px;
  z-index: 9999;
}

/* ===== 앱 ===== */
.app {
  position: absolute;
  inset: 0;
  background: #F9F9F9;
  overflow: hidden;
}

/* ===== 노치 ===== */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 44px;
  background: #fff;
  z-index: 10;
}

/* ===== App Body (NavRail + Content) ===== */
.app-body {
  position: absolute;
  top: 44px; left: 0; right: 0; bottom: 0;
  display: flex;
  overflow: hidden;
}

/* ===== NavRail ===== */
.navrail {
  width: 60px;
  flex-shrink: 0;
  background: #fff;
  border-right: 1px solid rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  z-index: 100;
}
.navrail-logo {
  width: 36px; height: 36px;
  background: #0A2463;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.rail-item {
  width: 48px; height: 48px;
  border: none; background: transparent;
  border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  color: rgba(0,0,0,0.45);
  transition: color 150ms, background 150ms;
  flex-shrink: 0;
  margin-bottom: 2px;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.rail-item:hover { background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.7); }
.rail-item.active { color: #0A2463; background: rgba(10,36,99,0.08); }
.rail-item.active::before {
  content: '';
  position: absolute;
  left: -1px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 22px;
  background: #0A2463;
  border-radius: 0 3px 3px 0;
}
.rail-item svg { width: 20px; height: 20px; }
.rail-micro {
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.01em; line-height: 1;
}
.rail-spacer { flex: 1; }

/* ===== Content Column ===== */
.content-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ===== TopHeader ===== */
.top-header {
  flex-shrink: 0;
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  gap: 6px;
  z-index: 50;
}
.header-brand {
  flex: 1;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.07em;
  color: #000;
  user-select: none;
}
.header-right { display: flex; align-items: center; gap: 2px; }
.icon-btn {
  width: 34px; height: 34px;
  border: none; background: transparent;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(0,0,0,0.6);
  flex-shrink: 0;
  transition: background 140ms, color 140ms;
  position: relative;
}
.icon-btn:hover { background: rgba(0,0,0,0.06); }
.icon-btn.active { background: rgba(10,36,99,0.08); color: #0A2463; }
.notif-badge {
  position: absolute;
  top: 5px; right: 5px;
  width: 7px; height: 7px;
  background: #EF4444;
  border-radius: 50%;
  border: 1.5px solid #fff;
}
.avatar-sm {
  width: 30px; height: 30px;
  border-radius: 50%; background: #0A2463;
  border: none;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 10px; font-weight: 700;
  flex-shrink: 0; margin-left: 2px;
}

/* ===== Main ===== */
.main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 0 8px;
}
.chat-welcome {
  display: flex; flex-direction: column;
  align-items: center;
  padding: 24px 14px 20px;
}
.ai-orb {
  width: 52px; height: 52px;
  background: #0A2463;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  margin-bottom: 14px;
  box-shadow: 0 5px 16px rgba(10,36,99,0.25);
}
.welcome-title {
  font-size: 18px; font-weight: 600;
  color: #000;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
  text-align: center;
}
.welcome-sub {
  font-size: 13px; color: rgba(0,0,0,0.5);
  text-align: center; line-height: 1.6;
}
.section-block { padding: 0 12px 14px; }
.section-label {
  font-size: 10px; font-weight: 700;
  color: rgba(0,0,0,0.32);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 8px; padding-left: 2px;
}
.prompt-cards { display: flex; flex-direction: column; gap: 8px; }
.prompt-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  padding: 11px 12px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  -webkit-tap-highlight-color: transparent;
}
.prompt-emoji {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.p-blue { background: rgba(10,36,99,0.08); }
.p-green { background: rgba(16,185,129,0.1); }
.p-amber { background: rgba(245,158,11,0.12); }
.prompt-body strong {
  display: block;
  font-size: 12px; font-weight: 600;
  color: #000;
  margin-bottom: 2px; line-height: 1.3;
}
.prompt-body span {
  font-size: 11px;
  color: rgba(0,0,0,0.5);
  line-height: 1.5;
}

/* ===== 채팅 입력바 ===== */
.chat-input-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 10px 12px;
  background: #fff;
  border-top: 1px solid rgba(0,0,0,0.08);
  z-index: 30;
}
.chat-input {
  flex: 1;
  height: 38px;
  border: 1.5px solid rgba(0,0,0,0.1);
  border-radius: 19px;
  padding: 0 14px;
  font-size: 13px;
  background: #F9F9F9;
  color: #000;
  outline: none;
  min-width: 0;
}
.chat-input:focus { border-color: rgba(10,36,99,0.3); background: #fff; }
.chat-input::placeholder { color: rgba(0,0,0,0.32); }
.send-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: #0A2463;
  border: none;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  flex-shrink: 0;
}

/* ===========================================================
   LP overlay — NavRail 우측부터 풀스크린
   닫혔을 때 visibility: hidden 으로 완전히 숨김
   =========================================================== */
.lp-overlay {
  position: absolute;
  top: 44px;          /* 노치 아래 */
  left: 60px;         /* NavRail 우측부터 */
  right: 0;
  bottom: 0;
  z-index: 200;
  visibility: hidden;
  pointer-events: none;
}
.lp-overlay.open {
  visibility: visible;
  pointer-events: auto;
}
.lp-dim {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  transition: background 240ms ease;
}
.lp-overlay.open .lp-dim {
  background: rgba(0,0,0,0.20);
}
.lp-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform 260ms cubic-bezier(0.16,1,0.3,1);
  box-shadow: 4px 0 20px rgba(0,0,0,0.12);
}
.lp-overlay.open .lp-panel {
  transform: translateX(0);
}
.lp-header {
  height: 56px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.lp-title { font-size: 15px; font-weight: 600; color: #000; }
.lp-close-btn {
  width: 32px; height: 32px;
  border: none;
  background: rgba(0,0,0,0.06);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(0,0,0,0.55);
}
.lp-close-btn:hover { background: rgba(0,0,0,0.1); }
.lp-user {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
}
.lp-avatar {
  width: 40px; height: 40px;
  border-radius: 50%; background: #0A2463;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700;
  flex-shrink: 0;
}
.lp-user-name { font-size: 14px; font-weight: 600; color: #000; line-height: 1.3; }
.lp-user-dept { font-size: 11px; color: rgba(0,0,0,0.5); margin-top: 2px; }
.lp-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.lp-sec-label {
  font-size: 10px; font-weight: 700;
  color: rgba(0,0,0,0.3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 12px 14px 4px;
}
.lp-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border: none; background: transparent;
  width: 100%; text-align: left;
  font-size: 14px;
  color: rgba(0,0,0,0.75);
  -webkit-tap-highlight-color: transparent;
}
.lp-item:hover { background: rgba(0,0,0,0.04); }
.lp-item.active {
  color: #0A2463;
  background: rgba(10,36,99,0.06);
  font-weight: 600;
}
.lp-item svg { width: 17px; height: 17px; opacity: 0.6; flex-shrink: 0; }
.lp-item.active svg { opacity: 1; }
.lp-footer {
  border-top: 1px solid rgba(0,0,0,0.08);
  padding: 8px 0 14px;
  flex-shrink: 0;
}

/* ===========================================================
   RP overlay — NavRail 우측부터 풀스크린, 우측에서 슬라이드
   =========================================================== */
.rp-overlay {
  position: absolute;
  top: 44px;
  left: 60px;
  right: 0;
  bottom: 0;
  z-index: 200;
  visibility: hidden;
  pointer-events: none;
}
.rp-overlay.open {
  visibility: visible;
  pointer-events: auto;
}
.rp-dim {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  transition: background 240ms ease;
}
.rp-overlay.open .rp-dim {
  background: rgba(0,0,0,0.20);
}
.rp-panel {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #FAFAFA;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 260ms cubic-bezier(0.16,1,0.3,1);
  box-shadow: -4px 0 20px rgba(0,0,0,0.12);
}
.rp-overlay.open .rp-panel {
  transform: translateX(0);
}
.rp-header {
  height: 56px;
  padding: 0 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  background: #fff;
  flex-shrink: 0;
}
.rp-title { font-size: 15px; font-weight: 600; color: #000; }
.rp-close-btn {
  width: 32px; height: 32px;
  border: none;
  background: rgba(0,0,0,0.06);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(0,0,0,0.55);
}
.rp-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.rp-widget {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  padding: 14px;
}
.widget-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.widget-dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-amber { background: #F59E0B; }
.dot-green { background: #10B981; }
.dot-brand { background: #0A2463; }
.widget-title {
  font-size: 12px; font-weight: 600;
  color: rgba(0,0,0,0.7);
  letter-spacing: 0.02em;
}
.widget-big {
  font-size: 28px; font-weight: 700;
  color: #000; line-height: 1;
  margin-bottom: 4px;
}
.widget-detail {
  font-size: 12px; color: rgba(0,0,0,0.55);
}

/* ===== 토스트 ===== */
.toast {
  position: absolute;
  top: 60px;
  left: 14px;
  right: 14px;
  z-index: 9000;
  background: rgba(10,36,99,0.95);
  color: #fff;
  font-size: 11px;
  padding: 8px 12px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  opacity: 1;
  transition: opacity 400ms;
}
.toast.hide { opacity: 0; pointer-events: none; }
.toast-text { flex: 1; line-height: 1.4; }
.toast-close {
  width: 18px; height: 18px;
  border: none; background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 14px; line-height: 1;
}
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app">
    <!-- 노치 -->
    <div class="status-bar"></div>

    <!-- App Body (NavRail + Content) -->
    <div class="app-body">
      <!-- NavRail -->
      <nav class="navrail">
        <div class="navrail-logo">
          <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="6.5" stroke-width="1.6"/><circle cx="9" cy="9" r="2.5" stroke-width="1.6"/></svg>
        </div>
        <button class="rail-item active" data-menu="home" onclick="toggleLp('home')">
          <svg viewBox="0 0 20 20"><path d="M3 9L10 3l7 6v8a1 1 0 0 1-1 1h-3v-5h-6v5H4a1 1 0 0 1-1-1V9Z" stroke-width="1.5"/></svg>
          <span class="rail-micro">홈</span>
        </button>
        <button class="rail-item" data-menu="board" onclick="toggleLp('board')">
          <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" rx="2" stroke-width="1.5"/><line x1="6" y1="7" x2="14" y2="7" stroke-width="1.5"/><line x1="6" y1="11" x2="12" y2="11" stroke-width="1.5"/></svg>
          <span class="rail-micro">게시판</span>
        </button>
        <button class="rail-item" data-menu="approval" onclick="toggleLp('approval')">
          <svg viewBox="0 0 20 20"><path d="M5 2h7l4 4v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1Z" stroke-width="1.5"/></svg>
          <span class="rail-micro">결재</span>
        </button>
        <button class="rail-item" data-menu="report" onclick="toggleLp('report')">
          <svg viewBox="0 0 20 20"><rect x="3" y="4" width="14" height="13" rx="2" stroke-width="1.5"/><line x1="6" y1="2" x2="6" y2="6" stroke-width="1.5"/><line x1="14" y1="2" x2="14" y2="6" stroke-width="1.5"/><line x1="3" y1="9" x2="17" y2="9" stroke-width="1.5"/></svg>
          <span class="rail-micro">보고</span>
        </button>
        <button class="rail-item" data-menu="calendar" onclick="toggleLp('calendar')">
          <svg viewBox="0 0 20 20"><rect x="3" y="4" width="14" height="13" rx="2" stroke-width="1.5"/><line x1="6" y1="2" x2="6" y2="6" stroke-width="1.5"/><line x1="14" y1="2" x2="14" y2="6" stroke-width="1.5"/><circle cx="10" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
          <span class="rail-micro">일정</span>
        </button>
        <div class="rail-spacer"></div>
        <button class="rail-item" data-menu="more" onclick="toggleLp('more')">
          <svg viewBox="0 0 20 20"><circle cx="5" cy="10" r="1.3" fill="currentColor" stroke="none"/><circle cx="10" cy="10" r="1.3" fill="currentColor" stroke="none"/><circle cx="15" cy="10" r="1.3" fill="currentColor" stroke="none"/></svg>
        </button>
      </nav>

      <!-- Content -->
      <div class="content-col">
        <!-- TopHeader -->
        <header class="top-header">
          <span class="header-brand">Infomind</span>
          <div class="header-right">
            <button class="icon-btn">
              <svg width="18" height="18" viewBox="0 0 20 20"><path d="M5 8a5 5 0 0 1 10 0v4l1.5 2.5h-13L5 12V8Z" stroke-width="1.5"/><path d="M8 16.5a2 2 0 0 0 4 0" stroke-width="1.5"/></svg>
              <span class="notif-badge"></span>
            </button>
            <button class="icon-btn" id="rpToggleBtn" onclick="toggleRp()">
              <svg width="18" height="18" viewBox="0 0 20 20"><rect x="2" y="3" width="16" height="14" rx="1.5" stroke-width="1.5"/><line x1="13" y1="3" x2="13" y2="17" stroke-width="1.5"/></svg>
            </button>
            <button class="avatar-sm">MK</button>
          </div>
        </header>

        <!-- Main -->
        <main class="main">
          <div class="chat-welcome">
            <div class="ai-orb">
              <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="8" stroke-width="1.5"/><circle cx="11" cy="11" r="3" stroke-width="1.5"/></svg>
            </div>
            <div class="welcome-title">안녕하세요, 김민기 님</div>
            <div class="welcome-sub">오늘 무엇을 도와드릴까요?<br/>질문하거나 업무를 요청해 보세요.</div>
          </div>
          <div class="section-block">
            <div class="section-label">추천 질문</div>
            <div class="prompt-cards">
              <div class="prompt-card">
                <div class="prompt-emoji p-amber">📋</div>
                <div class="prompt-body">
                  <strong>결재 현황 요약</strong>
                  <span>대기 3건, 완료 5건 내역</span>
                </div>
              </div>
              <div class="prompt-card">
                <div class="prompt-emoji p-green">📝</div>
                <div class="prompt-body">
                  <strong>주간보고 초안 작성</strong>
                  <span>AI로 이번 주 내용 정리</span>
                </div>
              </div>
              <div class="prompt-card">
                <div class="prompt-emoji p-blue">📅</div>
                <div class="prompt-body">
                  <strong>오늘 일정 확인</strong>
                  <span>오후 2시 외 2건</span>
                </div>
              </div>
            </div>
          </div>
        </main>

        <!-- 채팅 입력바 -->
        <div class="chat-input-bar">
          <input class="chat-input" placeholder="무엇이든 물어보세요" />
          <button class="send-btn">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8L13 8M9 4L13 8L9 12" stroke-width="2"/></svg>
          </button>
        </div>
      </div>
    </div><!-- .app-body -->

    <!-- LP overlay -->
    <div class="lp-overlay" id="lpOverlay">
      <div class="lp-dim" onclick="closeLp()"></div>
      <div class="lp-panel">
        <div class="lp-header">
          <span class="lp-title" id="lpTitle">메뉴</span>
          <button class="lp-close-btn" onclick="closeLp()">
            <svg width="13" height="13" viewBox="0 0 13 13"><line x1="2" y1="2" x2="11" y2="11" stroke-width="1.6"/><line x1="11" y1="2" x2="2" y2="11" stroke-width="1.6"/></svg>
          </button>
        </div>
        <div class="lp-user">
          <div class="lp-avatar">MK</div>
          <div>
            <div class="lp-user-name">김민기</div>
            <div class="lp-user-dept">개발팀 · 시니어 개발자</div>
          </div>
        </div>
        <nav class="lp-nav" id="lpNav"></nav>
        <div class="lp-footer">
          <button class="lp-item">
            <svg viewBox="0 0 17 17"><path d="M6 14H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h3" stroke-width="1.4"/><polyline points="10,11 14,8.5 10,6" stroke-width="1.4"/><line x1="14" y1="8.5" x2="5.5" y2="8.5" stroke-width="1.4"/></svg>
            로그아웃
          </button>
        </div>
      </div>
    </div>

    <!-- RP overlay -->
    <div class="rp-overlay" id="rpOverlay">
      <div class="rp-dim" onclick="closeRp()"></div>
      <div class="rp-panel">
        <div class="rp-header">
          <span class="rp-title">대시보드</span>
          <button class="rp-close-btn" onclick="closeRp()">
            <svg width="13" height="13" viewBox="0 0 13 13"><line x1="2" y1="2" x2="11" y2="11" stroke-width="1.6"/><line x1="11" y1="2" x2="2" y2="11" stroke-width="1.6"/></svg>
          </button>
        </div>
        <div class="rp-body">
          <div class="rp-widget">
            <div class="widget-header"><span class="widget-dot dot-amber"></span><span class="widget-title">받은 결재</span></div>
            <div class="widget-big">5</div>
            <div class="widget-detail">김철수 휴가신청 D-2</div>
          </div>
          <div class="rp-widget">
            <div class="widget-header"><span class="widget-dot dot-green"></span><span class="widget-title">오늘 일정</span></div>
            <div class="widget-big">3</div>
            <div class="widget-detail">10:00 스프린트 플래닝</div>
          </div>
          <div class="rp-widget">
            <div class="widget-header"><span class="widget-dot dot-brand"></span><span class="widget-title">남은 연차</span></div>
            <div class="widget-big">8.5</div>
            <div class="widget-detail">/ 15일</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 토스트 -->
    <div class="toast" id="toast">
      <span class="toast-text">좌측 NavRail 안 — 메뉴 클릭 → 풀스크린 슬라이드, 우상단 패널 토글</span>
      <button class="toast-close" onclick="closeToast()">×</button>
    </div>
  </div>
</div>

<script>
const LP_MENUS = {
  home: { title: '홈', items: [
    { label: '홈 / AI 채팅', active: true },
    { label: '대시보드' },
  ]},
  board: { title: '게시판', items: [
    { label: '전체 게시글', active: true },
    { label: '공지사항' },
    { label: '자유게시판' },
    { label: '내가 작성한 글' },
  ]},
  approval: { title: '전자결재', items: [
    { label: '받은 결재함', active: true },
    { label: '내가 올린 결재' },
    { label: '결재 완료' },
    { label: '새 결재 작성' },
  ]},
  report: { title: '주간보고', items: [
    { label: '내 주간보고', active: true },
    { label: '팀 주간보고' },
    { label: '주간보고 작성' },
  ]},
  calendar: { title: '캘린더', items: [
    { label: '오늘', active: true },
    { label: '이번 주' },
    { label: '이번 달' },
  ]},
  more: { title: '더보기', items: [
    { label: '임직원 디렉토리' },
    { label: '공지사항' },
    { label: '설정' },
  ]},
};

function dotIcon() {
  return '<svg viewBox="0 0 17 17"><circle cx="8.5" cy="8.5" r="3.5" stroke-width="1.4"/></svg>';
}

function renderLp(menuKey) {
  const data = LP_MENUS[menuKey] || LP_MENUS.home;
  document.getElementById('lpTitle').textContent = data.title;
  const nav = document.getElementById('lpNav');
  nav.innerHTML = '<div class="lp-sec-label">' + data.title + '</div>' +
    data.items.map(item =>
      '<button class="lp-item' + (item.active ? ' active' : '') + '">' + dotIcon() + item.label + '</button>'
    ).join('');
}

let currentMenu = null;

function toggleLp(menuKey) {
  const lp = document.getElementById('lpOverlay');
  if (currentMenu === menuKey && lp.classList.contains('open')) {
    closeLp();
    return;
  }
  closeRp();
  currentMenu = menuKey;
  renderLp(menuKey);
  document.querySelectorAll('.rail-item').forEach(el => {
    el.classList.toggle('active', el.dataset.menu === menuKey);
  });
  lp.classList.add('open');
}

function closeLp() {
  document.getElementById('lpOverlay').classList.remove('open');
  currentMenu = null;
  document.querySelectorAll('.rail-item').forEach(el => {
    el.classList.toggle('active', el.dataset.menu === 'home');
  });
}

function toggleRp() {
  const rp = document.getElementById('rpOverlay');
  const btn = document.getElementById('rpToggleBtn');
  if (rp.classList.contains('open')) {
    closeRp();
  } else {
    closeLp();
    rp.classList.add('open');
    btn.classList.add('active');
  }
}

function closeRp() {
  document.getElementById('rpOverlay').classList.remove('open');
  document.getElementById('rpToggleBtn').classList.remove('active');
}

function closeToast() {
  document.getElementById('toast').classList.add('hide');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeLp();
    closeRp();
  }
});

setTimeout(closeToast, 5000);
</script>
</body>
</html>
