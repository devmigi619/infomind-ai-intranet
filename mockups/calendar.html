<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infomind — 캘린더 (v3 인터랙티브 목업)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =============================================
   Design Tokens
   ============================================= */
:root {
  --bg-app: #F9F9F9;
  --bg-surface: #FFFFFF;
  --bg-surface-alt: #FAFAFA;
  --bg-muted: #F3F4F6;

  --text-primary: #000000;
  --text-secondary: rgba(0,0,0,0.85);
  --text-body: rgba(0,0,0,0.70);
  --text-muted: rgba(0,0,0,0.55);
  --text-soft: rgba(0,0,0,0.40);
  --text-faint: rgba(0,0,0,0.30);

  --border-light: rgba(0,0,0,0.06);
  --border-mid: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);

  --brand: #0A2463;
  --brand-dark: #082052;
  --brand-tint: rgba(10,36,99,0.08);
  --brand-tint-mid: rgba(10,36,99,0.14);

  /* 부서별 색 (자동 매핑, 추후 DB) */
  --dept-dev:     #2563EB;
  --dept-dev-soft:rgba(37,99,235,0.10);
  --dept-sec:     #8B5CF6;
  --dept-sec-soft:rgba(139,92,246,0.10);
  --dept-mgm:     #F59E0B;
  --dept-mgm-soft:rgba(245,158,11,0.12);
  --dept-dsn:     #10B981;
  --dept-dsn-soft:rgba(16,185,129,0.10);
  --dept-hr:      #EC4899;
  --dept-hr-soft: rgba(236,72,153,0.10);
  --dept-all:     #64748B;
  --dept-all-soft:rgba(100,116,139,0.12);

  /* 휴가(개념만 — 추후 결재 연동) */
  --vacation:     #DC2626;
  --vacation-soft:rgba(220,38,38,0.10);

  --weekend-sun: #EF4444;
  --weekend-sat: #3B82F6;

  --danger: #EF4444;
  --danger-soft: rgba(239,68,68,0.10);
  --success: #10B981;
  --warning: #F59E0B;

  --t: 200ms cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-pop: 0 8px 28px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
  --shadow-modal: 0 20px 60px rgba(0,0,0,0.22);
}

body.dark {
  --bg-app: #0B0F1A;
  --bg-surface: #131826;
  --bg-surface-alt: #1B2030;
  --bg-muted: #232A3D;
  --text-primary: #F1F5F9;
  --text-secondary: #E2E8F0;
  --text-body: #CBD5E1;
  --text-muted: #94A3B8;
  --text-soft: #64748B;
  --text-faint: #475569;
  --border-light: rgba(255,255,255,0.06);
  --border-mid: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --brand: #5B7BD3;
  --brand-tint: rgba(91,123,211,0.16);
  --brand-tint-mid: rgba(91,123,211,0.24);
}

/* =============================================
   Reset
   ============================================= */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  font-weight: 400;
  background: var(--bg-app);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
  transition: background var(--t), color var(--t);
}
button, input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
svg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

input[type="date"]::-webkit-clear-button,
input[type="time"]::-webkit-clear-button { display: none; }
input[type="date"]::-webkit-inner-spin-button,
input[type="time"]::-webkit-inner-spin-button { display: none; }

/* =============================================
   App Shell
   ============================================= */
.app {
  display: grid;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}
.body {
  display: grid;
  grid-template-columns: 64px 320px 1fr;
  height: calc(100vh - 48px);
  transition: grid-template-columns var(--t);
  overflow: hidden;
}
.app.lp-closed .body { grid-template-columns: 64px 0 1fr; }
.app.lp-closed .left-panel { display: none; }

/* =============================================
   TopHeader
   ============================================= */
.top-header {
  display: flex;
  align-items: center;
  padding: 0 16px 0 20px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-mid);
  gap: 14px;
  z-index: 10;
}
.brand {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--text-primary);
}
.search-bar-global {
  flex: 1;
  max-width: 460px;
  margin: 0 auto;
  position: relative;
  opacity: 0.5;
}
.search-bar-global input {
  width: 100%;
  height: 32px;
  border: 1px solid var(--border-mid);
  border-radius: 16px;
  padding: 0 14px 0 36px;
  background: var(--bg-muted);
  color: var(--text-soft);
  cursor: not-allowed;
}
.search-bar-global svg {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--text-faint);
}
.top-actions { display: flex; align-items: center; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-body);
  position: relative;
  transition: background var(--t), color var(--t);
}
.icon-btn:hover { background: var(--brand-tint); color: var(--brand); }
.icon-btn .dot {
  position: absolute;
  top: 8px; right: 8px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--danger);
  border: 1.5px solid var(--bg-surface);
}
.avatar-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--brand);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  margin-left: 4px;
}

/* =============================================
   NavRail
   ============================================= */
.nav-rail {
  background: var(--bg-surface);
  border-right: 1px solid var(--border-mid);
  padding: 12px 0;
  display: flex; flex-direction: column;
  gap: 4px; align-items: center;
}
.nav-item {
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  color: var(--text-muted);
  cursor: pointer;
  position: relative;
  transition: all var(--t);
}
.nav-item:hover { background: var(--brand-tint); color: var(--brand); }
.nav-item.active { background: var(--brand-tint); color: var(--brand); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -8px; top: 12px; bottom: 12px;
  width: 2px; background: var(--brand);
  border-radius: 0 2px 2px 0;
}
.nav-item .badge {
  position: absolute;
  top: 6px; right: 6px;
  background: var(--danger);
  color: #fff;
  font-size: 9px; font-weight: 600;
  padding: 1px 5px;
  border-radius: 8px;
  min-width: 14px;
  text-align: center;
}
.nav-divider {
  width: 32px; height: 1px;
  background: var(--border-mid);
  margin: 4px 0;
}

/* =============================================
   LeftPanel — Calendar Quick Panel
   ============================================= */
.left-panel {
  background: var(--bg-surface);
  border-right: 1px solid var(--border-mid);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.lp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-light);
}
.lp-header-left { display: flex; align-items: center; gap: 7px; }
.lp-header-left svg { color: var(--brand); }
.lp-title { font-size: 14px; font-weight: 600; }
.lp-header-actions { display: flex; gap: 4px; align-items: center; }
.lp-open-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px;
  background: var(--brand-tint);
  color: var(--brand);
  border-radius: 6px;
  font-size: 12px; font-weight: 600;
}
.lp-open-btn:hover { background: var(--brand-tint-mid); }
.lp-close-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
}
.lp-close-btn:hover { background: var(--bg-muted); color: var(--text-secondary); }

/* === LP 미니 월력 === */
.lp-mini {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border-light);
}
.lp-mini-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.lp-mini-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); }
.lp-mini-nav { display: flex; gap: 2px; }
.lp-mini-nav-btn {
  width: 22px; height: 22px;
  border-radius: 4px;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
}
.lp-mini-nav-btn:hover { background: var(--bg-muted); color: var(--text-primary); }
.lp-mini-nav-btn svg { width: 12px; height: 12px; }
.lp-mini-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 9px;
  color: var(--text-soft);
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.lp-mini-dow .sun { color: var(--weekend-sun); }
.lp-mini-dow .sat { color: var(--weekend-sat); }
.lp-mini-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
}
.lp-mini-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  position: relative;
  transition: background var(--t);
}
.lp-mini-day:hover { background: var(--bg-muted); }
.lp-mini-day.other { color: var(--text-faint); }
.lp-mini-day.sun { color: var(--weekend-sun); }
.lp-mini-day.sat { color: var(--weekend-sat); }
.lp-mini-day.today { background: var(--brand); color: #fff !important; }
.lp-mini-day.selected:not(.today) {
  outline: 1.5px solid var(--brand);
  outline-offset: -1.5px;
}
.lp-mini-day .dots {
  position: absolute;
  bottom: 1px;
  display: flex;
  gap: 2px;
}
.lp-mini-day .dot {
  width: 3px; height: 3px;
  border-radius: 50%;
}
.lp-mini-day.today .dot { background: #fff !important; }

/* === LP 일정 영역 === */
.lp-events {
  flex: 1;
  overflow-y: auto;
  padding: 12px 12px;
}
.lp-events-hdr {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin: 0 4px 8px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.lp-events-hdr .sub { color: var(--text-soft); font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 10.5px; }
.lp-day-group { margin-bottom: 12px; }
.lp-day-group:last-child { margin-bottom: 0; }
.lp-day-group-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 2px 6px 4px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.lp-day-group-label .num { color: var(--brand); font-weight: 700; }
.lp-event {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 7px;
  background: var(--bg-surface-alt);
  margin-bottom: 5px;
  border-left: 3px solid var(--border-mid);
  cursor: pointer;
  transition: background var(--t);
}
.lp-event:hover { background: var(--bg-muted); }
.lp-event-time {
  font-size: 11px; font-weight: 700;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  min-width: 36px;
  line-height: 1.35;
}
.lp-event-time small { display: block; color: var(--text-soft); font-weight: 400; font-size: 10px; }
.lp-event-time.allday { color: var(--text-muted); font-size: 10px; font-weight: 700; }
.lp-event-body { flex: 1; min-width: 0; }
.lp-event-title { font-size: 12.5px; color: var(--text-primary); margin-bottom: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lp-event-meta { font-size: 10.5px; color: var(--text-muted); }
.lp-empty { padding: 18px; text-align: center; font-size: 12px; color: var(--text-muted); }

/* 빠른 추가 카드 (일정 리스트 마지막에 자연스럽게) */
.lp-quick-card {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  border-radius: 7px;
  border: 1.5px dashed var(--border-strong);
  background: transparent;
  color: var(--brand);
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--t);
  margin-top: 4px;
}
.lp-quick-card:hover {
  background: var(--brand-tint);
  border-color: var(--brand);
  border-style: solid;
}
.lp-quick-card svg { width: 14px; height: 14px; }

/* =============================================
   Main = Calendar
   ============================================= */
.main-content {
  background: var(--bg-surface);
  display: flex; flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* 통합 툴바 */
.cal-toolbar {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-mid);
  flex-shrink: 0;
}

/* 1행: 좌측 액션 — 중앙 날짜 — 우측 액션 (대칭 3분할) */
.cal-toolbar-row1 {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 10px 18px 6px;
  gap: 14px;
}
.cal-tb-left { display: flex; align-items: center; gap: 8px; justify-content: flex-start; }
.cal-tb-center { display: flex; align-items: center; gap: 4px; justify-content: center; }
.cal-tb-right { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.cal-nav-btn {
  width: 30px; height: 30px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: background var(--t), color var(--t);
}
.cal-nav-btn:hover { background: var(--bg-muted); color: var(--text-primary); }
.cal-nav-btn:disabled, .cal-nav-btn.hidden { visibility: hidden; }
.cal-title {
  font-size: 18px; font-weight: 700;
  color: var(--text-primary);
  margin: 0 6px;
  text-align: center;
  min-width: 160px;
}
.cal-title small {
  font-size: 12px; font-weight: 400;
  color: var(--text-muted);
  margin-left: 6px;
}
.today-btn {
  padding: 6px 12px;
  border: 1px solid var(--border-mid);
  border-radius: 7px;
  background: var(--bg-surface);
  font-size: 12.5px;
  color: var(--text-body);
  transition: all var(--t);
}
.today-btn:hover { background: var(--bg-muted); color: var(--text-primary); }
.view-toggle {
  display: inline-flex;
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  background: var(--bg-surface-alt);
  padding: 2px;
}
.view-toggle .vt {
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  transition: all var(--t);
}
.view-toggle .vt:hover { color: var(--text-secondary); }
.view-toggle .vt.active {
  background: var(--brand);
  color: #fff;
  font-weight: 600;
}
.add-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px;
  background: var(--brand);
  color: #fff;
  border-radius: 7px;
  font-size: 12.5px; font-weight: 600;
}
.add-btn:hover { background: var(--brand-dark); }
.add-btn svg { width: 14px; height: 14px; }

/* 2행: 필터 */
.cal-toolbar-row2 {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 18px 10px;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cat-chips { display: flex; gap: 6px; align-items: center; }
.cat-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px;
  border-radius: 999px;
  border: 1px solid var(--border-mid);
  background: var(--bg-surface);
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--t);
  user-select: none;
}
.cat-chip:hover { background: var(--bg-muted); }
.cat-chip .cd { width: 8px; height: 8px; border-radius: 50%; }
.cat-chip.active {
  background: var(--text-primary);
  color: var(--bg-surface);
  border-color: var(--text-primary);
}
.cat-chip.active .cd { background: rgba(255,255,255,0.85) !important; }
.cat-chip.disabled {
  opacity: 0.45;
  cursor: not-allowed;
  border-style: dashed;
}
.cat-chip.disabled:hover { background: var(--bg-surface); }
.cat-chip .lock {
  font-size: 9px;
  padding: 1px 5px;
  background: var(--bg-muted);
  border-radius: 4px;
  margin-left: 2px;
  color: var(--text-faint);
}
.filter-divider {
  width: 1px; height: 20px;
  background: var(--border-mid);
  margin: 0 4px;
}
.dept-trigger {
  display: inline-flex; align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid var(--border-mid);
  background: var(--bg-surface);
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
}
.dept-trigger:hover { background: var(--bg-muted); }
.dept-trigger .count {
  background: var(--brand);
  color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 1px 5px;
  border-radius: 999px;
  margin-left: 2px;
}
.dept-trigger svg { width: 12px; height: 12px; }
.dept-pop {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border-mid);
  border-radius: 10px;
  box-shadow: var(--shadow-pop);
  padding: 8px;
  min-width: 200px;
  z-index: 30;
  display: none;
  flex-direction: column;
  gap: 2px;
}
.dept-pop.open { display: flex; }
.dept-pop-item {
  display: flex; align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12.5px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background var(--t);
}
.dept-pop-item:hover { background: var(--bg-muted); }
.dept-pop-item .cd { width: 8px; height: 8px; border-radius: 50%; }
.dept-pop-item .check {
  width: 14px; height: 14px;
  border: 1.5px solid var(--border-strong);
  border-radius: 3px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.dept-pop-item.checked .check { background: var(--brand); border-color: var(--brand); }
.dept-pop-item.checked .check::after {
  content: '';
  width: 7px; height: 4px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translate(1px, -1px);
}
.dept-pop-divider { height: 1px; background: var(--border-light); margin: 4px 0; }

.filter-right {
  display: inline-flex; align-items: center; gap: 10px;
}
.mine-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}
.switch {
  width: 30px; height: 16px;
  border-radius: 999px;
  background: var(--border-strong);
  position: relative;
  transition: background var(--t);
}
.switch::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #fff;
  top: 2px; left: 2px;
  transition: left var(--t);
  box-shadow: 0 1px 2px rgba(0,0,0,0.25);
}
.switch.on { background: var(--brand); }
.switch.on::after { left: 16px; }

/* 캘린더 본문 */
.cal-body {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--bg-surface);
}

/* =============================================
   Event styling
   ============================================= */
.ev {
  display: flex;
  align-items: center;
  gap: 4px;
  margin: 0 2px 2px;
  font-size: 11px;
  line-height: 1.4;
  border-radius: 3px;
  padding: 1px 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  transition: filter var(--t);
}
.ev:hover { filter: brightness(0.96); }

/* 종일 = 풀바 */
.ev.allday { color: #fff; font-weight: 600; padding: 2px 6px; }
.ev.allday.dept-dev    { background: var(--dept-dev); }
.ev.allday.dept-sec    { background: var(--dept-sec); }
.ev.allday.dept-mgm    { background: var(--dept-mgm); }
.ev.allday.dept-dsn    { background: var(--dept-dsn); }
.ev.allday.dept-hr     { background: var(--dept-hr); }
.ev.allday.dept-all    { background: var(--dept-all); }
.ev.allday.cat-vacation{ background: var(--vacation); }

/* 시간 = 도트 + 시간 + 제목 */
.ev.timed { color: var(--text-secondary); background: transparent; }
.ev.timed:hover { background: var(--bg-muted); }
.ev.timed .ev-dot { flex-shrink: 0; width: 7px; height: 7px; border-radius: 50%; }
.ev.timed.dept-dev .ev-dot    { background: var(--dept-dev); }
.ev.timed.dept-sec .ev-dot    { background: var(--dept-sec); }
.ev.timed.dept-mgm .ev-dot    { background: var(--dept-mgm); }
.ev.timed.dept-dsn .ev-dot    { background: var(--dept-dsn); }
.ev.timed.dept-hr .ev-dot     { background: var(--dept-hr); }
.ev.timed.dept-all .ev-dot    { background: var(--dept-all); }
.ev.timed.cat-vacation .ev-dot{ background: var(--vacation); }
.ev.timed .ev-time {
  font-variant-numeric: tabular-nums;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-muted);
}
.ev .ev-title { overflow: hidden; text-overflow: ellipsis; flex: 1; }

/* 멀티데이 종일 일정 — 이어지는 바 */
.ev.multiday {
  position: absolute;
  left: 2px; right: 2px;
  top: var(--md-top, 24px);
  height: 18px;
  display: flex; align-items: center;
  margin: 0;
}
.ev.multiday.continues-right { border-top-right-radius: 0; border-bottom-right-radius: 0; right: -1px; }
.ev.multiday.continues-left { border-top-left-radius: 0; border-bottom-left-radius: 0; left: -1px; padding-left: 4px; }
.ev.multiday.continues-left.continues-right { padding-left: 4px; padding-right: 4px; }
.ev.multiday.continues-left .ev-title::before { content: '… '; opacity: 0.7; }

.ev-more {
  font-size: 10.5px;
  color: var(--text-muted);
  padding: 1px 5px;
  margin: 0 2px;
  cursor: pointer;
}
.ev-more:hover { color: var(--brand); }

/* =============================================
   Month View
   ============================================= */
.cal-month {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100%;
}
.month-dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--bg-surface-alt);
  border-bottom: 1px solid var(--border-mid);
}
.month-dow {
  padding: 8px 0;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
.month-dow.sun { color: var(--weekend-sun); }
.month-dow.sat { color: var(--weekend-sat); }
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: 1fr;
  overflow: hidden;
}
.month-week {
  display: contents;
}
.month-cell {
  padding: 3px 3px 3px;
  border-right: 1px solid var(--border-light);
  border-bottom: 1px solid var(--border-light);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  min-height: 110px;
  background: var(--bg-surface);
  transition: background var(--t);
}
.month-cell:hover { background: var(--bg-surface-alt); }
.month-cell:nth-child(7n) { border-right: none; }
.month-cell.other { background: var(--bg-surface-alt); }
.month-cell.other .day-num { color: var(--text-faint); }
.day-num-wrap {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 50%;
  margin: 3px 3px 4px;
}
.month-cell.today .day-num-wrap { background: var(--brand); }
.month-cell.today .day-num { color: #fff !important; }
.day-num { font-size: 12px; font-weight: 700; color: var(--text-primary); }
.day-num.sun { color: var(--weekend-sun); }
.day-num.sat { color: var(--weekend-sat); }

/* 멀티데이 바 컨테이너 (행 위에 absolute로 띄움) */
.month-cell .md-spacer {
  height: var(--md-spacer, 0px);
}

/* =============================================
   Week View
   ============================================= */
.cal-week {
  display: grid;
  grid-template-rows: auto auto 1fr;
  height: 100%;
  overflow: hidden;
}
.week-head {
  display: grid;
  grid-template-columns: 56px repeat(7, 1fr);
  background: var(--bg-surface-alt);
  border-bottom: 1px solid var(--border-mid);
}
.week-head-time { border-right: 1px solid var(--border-light); }
.week-head-col {
  padding: 8px 4px;
  text-align: center;
  border-right: 1px solid var(--border-light);
  cursor: pointer;
}
.week-head-col:last-child { border-right: none; }
.week-head-col:hover { background: var(--bg-muted); }
.week-head-col .dow { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 3px; }
.week-head-col.sun .dow { color: var(--weekend-sun); }
.week-head-col.sat .dow { color: var(--weekend-sat); }
.week-head-col .num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px;
  border-radius: 999px;
  font-size: 14px; font-weight: 700;
  color: var(--text-primary);
}
.week-head-col.sun .num { color: var(--weekend-sun); }
.week-head-col.sat .num { color: var(--weekend-sat); }
.week-head-col.today .num { background: var(--brand); color: #fff !important; }

.week-allday {
  display: grid;
  grid-template-columns: 56px repeat(7, 1fr);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-mid);
  min-height: 36px;
  max-height: 96px;
  overflow-y: auto;
  position: relative;
}
.week-allday-label {
  border-right: 1px solid var(--border-light);
  background: var(--bg-surface-alt);
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 10px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.week-allday-grid {
  position: relative;
  grid-column: 2 / -1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  min-height: 36px;
  padding: 4px 0;
  gap: 2px;
}
.week-allday-cell {
  border-right: 1px solid var(--border-light);
  cursor: pointer;
}
.week-allday-cell:last-child { border-right: none; }

.week-timeline {
  overflow-y: auto;
  position: relative;
}
.week-timeline-inner {
  display: grid;
  grid-template-columns: 56px repeat(7, 1fr);
  position: relative;
}
.week-time-col {
  border-right: 1px solid var(--border-light);
  position: relative;
  cursor: pointer;
}
.week-time-col:last-child { border-right: none; }
.week-time-col.today { background: rgba(10,36,99,0.025); }
.week-time-col:hover { background: var(--bg-muted); }
.week-time-label {
  border-right: 1px solid var(--border-mid);
  background: var(--bg-surface-alt);
  text-align: right;
  padding: 0 8px;
  font-size: 10px;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
  height: 48px;
  padding-top: 2px;
}
.week-time-cell { height: 48px; border-bottom: 1px solid var(--border-light); }

.te {
  position: absolute;
  left: 2px; right: 2px;
  border-radius: 5px;
  padding: 4px 6px;
  font-size: 11px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow-card);
  border-left: 3px solid;
  background: var(--bg-surface);
  z-index: 2;
  transition: filter var(--t), box-shadow var(--t);
}
.te:hover { filter: brightness(0.98); box-shadow: 0 3px 10px rgba(0,0,0,0.10); }
.te.dept-dev    { border-left-color: var(--dept-dev);    background: var(--dept-dev-soft);    color: var(--dept-dev); }
.te.dept-sec    { border-left-color: var(--dept-sec);    background: var(--dept-sec-soft);    color: var(--dept-sec); }
.te.dept-mgm    { border-left-color: var(--dept-mgm);    background: var(--dept-mgm-soft);    color: var(--dept-mgm); }
.te.dept-dsn    { border-left-color: var(--dept-dsn);    background: var(--dept-dsn-soft);    color: var(--dept-dsn); }
.te.dept-hr     { border-left-color: var(--dept-hr);     background: var(--dept-hr-soft);     color: var(--dept-hr); }
.te.dept-all    { border-left-color: var(--dept-all);    background: var(--dept-all-soft);    color: var(--dept-all); }
.te.cat-vacation{ border-left-color: var(--vacation);    background: var(--vacation-soft);    color: var(--vacation); }
.te .te-title { font-weight: 700; font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.te .te-time { font-size: 10.5px; opacity: 0.85; font-variant-numeric: tabular-nums; margin-top: 1px; }
.te .te-meta { font-size: 10px; opacity: 0.7; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* 현재 시각 라인 */
.now-line {
  position: absolute;
  left: 56px; right: 0;
  height: 2px;
  background: var(--danger);
  z-index: 5;
  pointer-events: none;
}
.now-line::before {
  content: '';
  position: absolute;
  left: -5px; top: -4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--danger);
}

/* =============================================
   Day View
   ============================================= */
.cal-day {
  display: grid;
  grid-template-rows: auto auto 1fr;
  height: 100%;
  overflow: hidden;
}
.day-allday {
  padding: 8px 20px;
  border-bottom: 1px solid var(--border-light);
  background: var(--bg-surface);
}
.day-allday-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.day-allday .ev.allday {
  display: flex;
  align-items: center;
  margin-bottom: 4px;
  font-size: 13px;
  padding: 6px 10px;
}
.day-allday .ev-meta-sm {
  margin-left: auto;
  font-weight: 400;
  opacity: 0.85;
  font-size: 11px;
}
.day-allday-empty {
  font-size: 11.5px;
  color: var(--text-faint);
  padding: 4px 2px;
}
.day-timeline {
  overflow-y: auto;
  position: relative;
}
.day-timeline-inner {
  display: grid;
  grid-template-columns: 64px 1fr;
  position: relative;
}
.day-time-label {
  border-right: 1px solid var(--border-mid);
  background: var(--bg-surface-alt);
  text-align: right;
  padding: 0 10px;
  font-size: 11px;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
  height: 60px;
  padding-top: 2px;
}
.day-time-col { position: relative; cursor: pointer; }
.day-time-cell { height: 60px; border-bottom: 1px solid var(--border-light); }
.day-time-col .te { padding: 8px 12px; font-size: 13px; left: 6px; right: 10px; }
.day-time-col .te .te-title { font-size: 13.5px; }
.day-time-col .te .te-time { font-size: 11.5px; }
.day-time-col .te .te-meta { font-size: 11px; }
.day-now-line {
  position: absolute;
  left: 64px; right: 0;
  height: 2px;
  background: var(--danger);
  z-index: 5;
}
.day-now-line::before {
  content: '';
  position: absolute;
  left: -5px; top: -4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--danger);
}

/* =============================================
   List View
   ============================================= */
.cal-list { height: 100%; overflow-y: auto; background: var(--bg-surface); }
.list-day-block {
  display: grid;
  grid-template-columns: 80px 1fr;
  border-bottom: 1px solid var(--border-light);
  align-items: stretch;
}
.list-day-block:last-of-type { border-bottom: none; }
.list-day-label {
  padding: 14px 16px 14px 18px;
  background: var(--bg-surface-alt);
  border-right: 1px solid var(--border-light);
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-start;
  font-variant-numeric: tabular-nums;
}
.list-day-label .lbl-main {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}
.list-day-label .lbl-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
.list-day-label.today .lbl-main { color: var(--brand); }
.list-day-label.today .lbl-sub { color: var(--brand); opacity: 0.7; }
.list-day-label.weekend-sun .lbl-main { color: var(--weekend-sun); }
.list-day-label.weekend-sat .lbl-main { color: var(--weekend-sat); }
.list-day-items {
  padding: 6px 0;
}
.list-row {
  display: grid;
  grid-template-columns: 78px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 9px 16px 9px 14px;
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: background var(--t);
}
.list-row:hover { background: var(--bg-muted); }
.list-row.dept-dev   { border-left-color: var(--dept-dev); }
.list-row.dept-sec   { border-left-color: var(--dept-sec); }
.list-row.dept-mgm   { border-left-color: var(--dept-mgm); }
.list-row.dept-dsn   { border-left-color: var(--dept-dsn); }
.list-row.dept-hr    { border-left-color: var(--dept-hr); }
.list-row.dept-all   { border-left-color: var(--dept-all); }
.list-row.cat-vacation { border-left-color: var(--vacation); }
.list-row-time {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  line-height: 1.3;
}
.list-row-time small { display: block; font-weight: 400; color: var(--text-soft); font-size: 11px; }
.list-row-time.allday { font-size: 11px; font-weight: 700; color: var(--text-muted); }
.list-row-title { font-size: 14px; color: var(--text-primary); margin-bottom: 2px; }
.list-row-meta { font-size: 11px; color: var(--text-muted); }
.list-row-meta .dept-tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10.5px;
  font-weight: 600;
  margin-right: 6px;
}
.dept-tag.dept-dev    { background: var(--dept-dev-soft);    color: var(--dept-dev); }
.dept-tag.dept-sec    { background: var(--dept-sec-soft);    color: var(--dept-sec); }
.dept-tag.dept-mgm    { background: var(--dept-mgm-soft);    color: var(--dept-mgm); }
.dept-tag.dept-dsn    { background: var(--dept-dsn-soft);    color: var(--dept-dsn); }
.dept-tag.dept-hr     { background: var(--dept-hr-soft);     color: var(--dept-hr); }
.dept-tag.dept-all    { background: var(--dept-all-soft);    color: var(--dept-all); }
.dept-tag.cat-vacation{ background: var(--vacation-soft);    color: var(--vacation); }
.list-row-attd { font-size: 11px; color: var(--text-muted); display: inline-flex; align-items: center; gap: 4px; }
.list-row-attd svg { width: 12px; height: 12px; }
.list-loadmore {
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 18px;
  color: var(--brand);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--t);
}
.list-loadmore:hover { background: var(--bg-muted); }
.list-loadmore svg { width: 14px; height: 14px; }
.list-empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}

/* =============================================
   Modal
   ============================================= */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.5);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg-surface);
  border-radius: 14px;
  width: 100%;
  max-width: 480px;
  max-height: 92vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-modal);
  transform: scale(0.96) translateY(8px);
  transition: transform 200ms cubic-bezier(0.16,1,0.3,1);
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-mid);
}
.modal-hdr-title { font-size: 16px; font-weight: 700; }
.modal-hdr-actions { display: flex; gap: 6px; }
.modal-icon-btn {
  width: 30px; height: 30px;
  border-radius: 6px;
  background: var(--bg-muted);
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--t);
}
.modal-icon-btn:hover { background: var(--brand-tint); color: var(--brand); }
.modal-icon-btn svg { width: 14px; height: 14px; }
.modal-icon-btn.danger { background: var(--danger-soft); color: var(--danger); }
.modal-icon-btn.danger:hover { background: var(--danger); color: #fff; }
.modal-icon-btn.brand { background: var(--brand-tint); color: var(--brand); }
.modal-icon-btn.brand:hover { background: var(--brand); color: #fff; }
.modal-body { padding: 18px 20px; overflow-y: auto; flex: 1; }

/* 모달 필드 그룹 */
.mfield { margin-bottom: 16px; }
.mfield:last-child { margin-bottom: 0; }
.mfield-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 7px;
}

.minput {
  width: 100%;
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  padding: 10px 12px;
  background: var(--bg-surface);
  color: var(--text-primary);
  transition: border-color var(--t);
}
.minput:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
textarea.minput { resize: vertical; min-height: 70px; font-family: inherit; }
.minput.title { font-size: 15px; font-weight: 600; }

/* 시간 카드: 날짜·시간·종일·반복 묶음 */
.time-card {
  border: 1px solid var(--border-mid);
  border-radius: 10px;
  padding: 12px 14px;
  background: var(--bg-surface-alt);
}
.time-card-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.time-card-row:last-child { margin-bottom: 0; }
.time-card-toggles {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding-top: 4px;
  border-top: 1px dashed var(--border-light);
  margin-top: 4px;
  padding-top: 10px;
}
.toggle-row {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-body);
  cursor: pointer;
  user-select: none;
}
.dt-pair-modal {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  flex: 1;
}
.dt-pair-modal input[type="date"], .dt-pair-modal input[type="time"] {
  width: 100%;
  border: 1px solid var(--border-mid);
  border-radius: 7px;
  padding: 7px 10px;
  background: var(--bg-surface);
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  font-size: 13px;
}
.dt-pair-modal input:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
.dt-pair-modal input:disabled { background: var(--bg-muted); color: var(--text-faint); cursor: not-allowed; }
.time-card-row .dt-sep {
  color: var(--text-soft);
  font-size: 12px;
  flex-shrink: 0;
  margin: 0 2px;
}
.time-card-row .dt-pair-modal.allday { grid-template-columns: 1fr; }
.time-card-row .dt-pair-modal.allday input[type="time"] { display: none; }

.loop-chips { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.loop-chip {
  padding: 4px 11px;
  border: 1px solid var(--border-mid);
  border-radius: 999px;
  font-size: 11.5px;
  color: var(--text-body);
  cursor: pointer;
  transition: all var(--t);
  background: var(--bg-surface);
}
.loop-chip:hover { background: var(--bg-muted); }
.loop-chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }

/* 미니 캘린더 (모달 inline, 접기 가능) */
.mini-cal-toggle {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  color: var(--brand);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  margin-top: 8px;
  background: transparent;
  transition: background var(--t);
}
.mini-cal-toggle:hover { background: var(--brand-tint); }
.mini-cal-toggle svg { width: 12px; height: 12px; transition: transform var(--t); }
.mini-cal-wrap {
  margin-top: 10px;
  padding: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  display: none;
}
.mini-cal-wrap.open { display: block; }
.mini-cal-toggle.open svg { transform: rotate(180deg); }
.mc-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.mc-title { font-size: 13px; font-weight: 700; }
.mc-nav { display: flex; gap: 2px; }
.mc-nav-btn {
  width: 22px; height: 22px;
  border-radius: 4px;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
}
.mc-nav-btn:hover { background: var(--bg-muted); color: var(--text-primary); }
.mc-nav-btn svg { width: 12px; height: 12px; }
.mc-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-weight: 600;
}
.mc-dow .sun { color: var(--weekend-sun); }
.mc-dow .sat { color: var(--weekend-sat); }
.mc-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.mc-day {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  position: relative;
  transition: background var(--t);
}
.mc-day:hover { background: var(--brand-tint); }
.mc-day.other { color: var(--text-faint); }
.mc-day.sun { color: var(--weekend-sun); }
.mc-day.sat { color: var(--weekend-sat); }
.mc-day.today { outline: 1.5px solid var(--brand); }
.mc-day.in-range {
  background: var(--brand-tint);
  border-radius: 0;
  color: var(--brand);
}
.mc-day.range-start, .mc-day.single-pick, .mc-day.range-end {
  background: var(--brand);
  color: #fff !important;
  border-radius: 5px;
}
.mc-day.in-range.range-start { border-top-right-radius: 0; border-bottom-right-radius: 0; }
.mc-day.in-range.range-end { border-top-left-radius: 0; border-bottom-left-radius: 0; }
.mc-day.loop-preview::after {
  content: '';
  position: absolute;
  bottom: 2px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--warning);
}
.mc-hint {
  margin-top: 8px;
  font-size: 10.5px;
  color: var(--text-muted);
  line-height: 1.5;
  text-align: center;
}

/* 부서 select */
.dept-select {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.dept-option {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  border: 1px solid var(--border-mid);
  border-radius: 999px;
  background: var(--bg-surface);
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--t);
}
.dept-option:hover { background: var(--bg-muted); }
.dept-option .cd { width: 8px; height: 8px; border-radius: 50%; }
.dept-option.active {
  background: var(--text-primary);
  color: var(--bg-surface);
  border-color: var(--text-primary);
}
.dept-option.active .cd { background: rgba(255,255,255,0.85) !important; }

/* 참석자 */
.attd-search-wrap { position: relative; }
.attd-search {
  width: 100%;
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  padding: 9px 12px 9px 34px;
  background: var(--bg-surface);
  color: var(--text-primary);
}
.attd-search:focus { outline: 2px solid var(--brand); outline-offset: -1px; }
.attd-search-wrap > svg {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  width: 13px; height: 13px;
  color: var(--text-muted);
}
.attd-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border-mid);
  border-radius: 10px;
  box-shadow: var(--shadow-pop);
  max-height: 200px;
  overflow-y: auto;
  z-index: 5;
  display: none;
}
.attd-dropdown.open { display: block; }
.attd-dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  cursor: pointer;
  transition: background var(--t);
}
.attd-dropdown-item:hover { background: var(--bg-muted); }
.attd-dropdown-item.added { opacity: 0.4; cursor: not-allowed; }
.attd-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--bg-muted);
  color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.attd-dropdown-item.dept-dev .attd-avatar { background: var(--dept-dev-soft); color: var(--dept-dev); }
.attd-dropdown-item.dept-sec .attd-avatar { background: var(--dept-sec-soft); color: var(--dept-sec); }
.attd-dropdown-item.dept-mgm .attd-avatar { background: var(--dept-mgm-soft); color: var(--dept-mgm); }
.attd-dropdown-item.dept-dsn .attd-avatar { background: var(--dept-dsn-soft); color: var(--dept-dsn); }
.attd-dropdown-item.dept-hr .attd-avatar  { background: var(--dept-hr-soft);  color: var(--dept-hr); }
.attd-info { flex: 1; min-width: 0; }
.attd-name { font-size: 13px; color: var(--text-primary); }
.attd-dept-sub { font-size: 11px; color: var(--text-muted); }

.attd-selected {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 8px;
  min-height: 24px;
}
.attd-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 4px;
  border: 1px solid var(--border-mid);
  border-radius: 999px;
  background: var(--bg-surface-alt);
  font-size: 12px;
  color: var(--text-primary);
}
.attd-chip .attd-avatar { width: 20px; height: 20px; font-size: 10px; }
.attd-chip .name { padding: 0 6px 0 2px; }
.attd-chip .remove {
  width: 18px; height: 18px;
  border-radius: 50%;
  color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.attd-chip .remove:hover { background: var(--bg-muted); color: var(--danger); }

.modal-ftr {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border-mid);
  background: var(--bg-surface-alt);
}
.btn {
  padding: 9px 18px;
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 600;
  transition: all var(--t);
}
.btn:hover { background: var(--bg-muted); }
.btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
.btn.primary:hover { background: var(--brand-dark); }

/* 상세 모달 */
.detail-head { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.detail-head-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-pill {
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg-muted);
  color: var(--text-muted);
}
.detail-pill.dept {
  background: var(--dept-dev-soft);
  color: var(--dept-dev);
}
.detail-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 2px 0 0; }

.detail-info {
  background: var(--bg-surface-alt);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 12px;
}
.detail-info-row {
  display: flex; align-items: flex-start;
  gap: 10px;
  padding: 5px 0;
  font-size: 13px;
}
.detail-info-row .icon { color: var(--text-muted); margin-top: 2px; }
.detail-info-row .icon svg { width: 14px; height: 14px; }
.detail-info-row .k { width: 60px; flex-shrink: 0; color: var(--text-muted); font-size: 12px; }
.detail-info-row .v { flex: 1; color: var(--text-primary); }

.detail-respond {
  border: 1px solid var(--border-mid);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 12px;
  background: var(--bg-surface);
}
.detail-respond-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
.detail-respond-row { display: flex; gap: 8px; }
.respond-btn {
  flex: 1;
  padding: 9px;
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 600;
  text-align: center;
  transition: all var(--t);
}
.respond-btn:hover { background: var(--bg-muted); }
.respond-btn.yes.active { background: var(--success); color: #fff; border-color: var(--success); }
.respond-btn.no.active { background: var(--danger); color: #fff; border-color: var(--danger); }

.detail-attd-list { display: flex; flex-direction: column; gap: 5px; }
.detail-attd-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  background: var(--bg-surface-alt);
  border-radius: 7px;
}
.detail-attd-name { flex: 1; font-size: 13px; color: var(--text-primary); }
.detail-attd-status {
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
}
.detail-attd-status.yes { background: rgba(16,185,129,0.14); color: #047857; }
.detail-attd-status.no { background: var(--danger-soft); color: #B91C1C; }
.detail-attd-status.pending { background: var(--bg-muted); color: var(--text-muted); }

/* Overflow popover */
.overflow-pop {
  position: fixed;
  background: var(--bg-surface);
  border: 1px solid var(--border-mid);
  border-radius: 10px;
  box-shadow: var(--shadow-pop);
  padding: 12px;
  z-index: 90;
  min-width: 220px;
  max-width: 280px;
  max-height: 360px;
  overflow-y: auto;
  display: none;
}
.overflow-pop.open { display: block; }
.overflow-pop-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.overflow-pop .ev { margin-bottom: 4px; padding: 5px 8px; }
.overflow-pop .ev.timed { background: var(--bg-surface-alt); }
.overflow-pop .ev.timed:hover { background: var(--bg-muted); }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,36,99,0.94);
  color: #fff;
  padding: 11px 18px;
  border-radius: 10px;
  font-size: 13px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 300ms, transform 300ms;
}
.toast.show { opacity: 1; }

/* Demo Controls */
.demo-controls {
  position: fixed;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: #fff;
  padding: 7px 11px;
  border-radius: 10px;
  font-size: 11px;
  display: flex; align-items: center; gap: 6px;
  z-index: 9999;
  flex-wrap: wrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}
.demo-controls .lbl { padding: 0 5px; opacity: 0.6; font-size: 10px; letter-spacing: 0.05em; }
.demo-controls button {
  background: rgba(255,255,255,0.12);
  color: #fff;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
}
.demo-controls button.active { background: #fff; color: #000; }
.demo-controls button:hover:not(.active) { background: rgba(255,255,255,0.22); }
.demo-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 2px; }

/* Mobile */
.mobile-tabbar {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-mid);
  z-index: 50;
}
.mobile-tabbar .tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  color: var(--text-muted);
  font-size: 10px;
}
.mobile-tabbar .tab.active { color: var(--brand); }
.mobile-tabbar .tab svg { width: 18px; height: 18px; }
.mobile-fab {
  display: none;
  position: fixed;
  bottom: 72px;
  right: 16px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--brand);
  color: #fff;
  align-items: center; justify-content: center;
  z-index: 49;
  box-shadow: 0 6px 18px rgba(10,36,99,0.45);
}
.mobile-fab svg { width: 22px; height: 22px; }

@media (max-width: 768px) {
  .app { grid-template-rows: 52px 1fr; }
  .top-header { padding: 0 12px; }
  .brand { font-size: 16px; }
  .search-bar-global { display: none; }
  .top-actions { margin-left: auto; }
  .body { grid-template-columns: 1fr; }
  .nav-rail, .left-panel { display: none; }

  .cal-toolbar-row1 {
    grid-template-columns: auto 1fr auto;
    padding: 8px 14px 4px;
    gap: 4px;
  }
  .cal-tb-left { display: none; }
  .cal-tb-right { gap: 4px; }
  .today-btn { padding: 5px 9px; font-size: 11.5px; }
  .view-toggle .vt { padding: 4px 9px; }
  .add-btn { display: none; }

  .cal-toolbar-row2 {
    padding: 4px 14px 8px;
    overflow-x: auto;
  }
  .filter-left { flex-wrap: nowrap; }
  .filter-right { display: none; }
  .filter-divider { display: none; }

  .month-cell { min-height: 78px; padding: 1px; }
  .day-num-wrap { width: 18px; height: 18px; margin: 2px; }
  .day-num { font-size: 11px; }
  .ev { font-size: 10px; padding: 1px 4px; margin: 0 1px 1px; }
  .ev.timed .ev-time { font-size: 9.5px; }

  .week-head, .week-allday, .week-timeline-inner { grid-template-columns: 42px repeat(7, 1fr); }
  .week-time-label { font-size: 9px; padding: 0 4px; height: 42px; }
  .week-time-cell { height: 42px; }
  .week-head-col .num { width: 22px; height: 22px; font-size: 12px; }
  .now-line { left: 42px; }

  .day-time-label { font-size: 10px; padding: 0 6px; }
  .list-day-block { grid-template-columns: 64px 1fr; }
  .list-day-label { padding: 12px 8px 12px 14px; }
  .list-day-label .lbl-main { font-size: 14px; }
  .list-row { grid-template-columns: 64px 1fr; padding: 8px 14px 8px 12px; }
  .list-row-attd { display: none; }

  .mobile-tabbar { display: flex; }
  .mobile-fab { display: inline-flex; }
  .cal-body { padding-bottom: 56px; }
  .modal { max-height: calc(100vh - 30px); border-radius: 10px; }
  .modal-body { padding: 14px 16px; }
  .dt-pair-modal { grid-template-columns: 1fr; }
  .time-card-row { flex-direction: column; align-items: stretch; }
  .time-card-row .dt-sep { display: none; }
  .demo-controls { bottom: 64px; max-width: 92vw; font-size: 10px; }
  .demo-controls .lbl { display: none; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>

      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>

  </header>

  <div class="body">
    <nav class="nav-rail">
      <div class="nav-item" title="홈"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V21H3z"/><path d="M9 21V12h6v9"/></svg></div>
      <div class="nav-divider"></div>
      <div class="nav-item" title="게시판"><svg width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9h10M7 13h10M7 17h6"/></svg></div>
      <div class="nav-item" title="전자결재"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 15l2 2 4-4"/></svg><span class="badge">2</span></div>

      <div class="nav-item active" title="캘린더"><svg width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <div class="nav-item" title="회의실"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21V12h6v9"/></svg></div>
      <div class="nav-item" title="차량"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M3 17h2l1.5-7h11L19 17h2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/></svg></div>
    </nav>

    <aside class="left-panel">
      <div class="lp-header">
        <div class="lp-header-left">
          <svg width="15" height="15" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span class="lp-title">캘린더</span>
        </div>
        <div class="lp-header-actions">
          <button class="lp-open-btn">열기
            <svg width="11" height="11" viewBox="0 0 24 24" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </button>
          <button class="lp-close-btn" id="lpCloseBtn"><svg width="14" height="14" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
      </div>

      <!-- 월력 미니 캘린더 -->
      <div class="lp-mini">
        <div class="lp-mini-hdr">
          <span class="lp-mini-title" id="lpMiniTitle">2026년 5월</span>
          <div class="lp-mini-nav">
            <button class="lp-mini-nav-btn" id="lpMiniPrev"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
            <button class="lp-mini-nav-btn" id="lpMiniNext"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
          </div>
        </div>
        <div class="lp-mini-dow">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div class="lp-mini-grid" id="lpMiniGrid"></div>
      </div>

      <!-- 일정 영역 (오늘 우선 + 비면 앞으로) -->
      <div class="lp-events">
        <div class="lp-events-hdr">

          <span class="sub" id="lpEventsSub"></span>

    <main class="main-content">

              <button class="vt active" data-view="month">월</button>
              <button class="vt" data-view="week">주</button>
              <button class="vt" data-view="day">일</button>
              <button class="vt" data-view="list">목록</button>

        <div class="cal-toolbar-row2">
