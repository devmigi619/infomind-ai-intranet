  { sn: 18, title: 'QA 점검', cat: 'schedule', start: '20260527', end: '20260527', startHr: '1000', endHr: '1200', allday: false, user: 'jicheol', dept: 'DEV' },
  { sn: 19, title: '경영회의', cat: 'schedule', start: '20260528', end: '20260528', startHr: '0900', endHr: '1100', allday: false, user: 'bujang', dept: 'MGM' },
];

let state = {
  view: 'month',
  current: new Date(TODAY),
  catFilters: new Set(['schedule']),
  deptFilters: new Set(),
  mineOnly: false,
  listLimit: 15,
  lpCurrent: new Date(TODAY),
  lpSelectedDate: new Date(TODAY),
};
let nextSn = 100;

/* =============================================
   Helpers
   ============================================= */
function pad(n) { return String(n).padStart(2, '0'); }
function ymd(d) { return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`; }
function ymdParts(s) { return { y: +s.slice(0,4), m: +s.slice(4,6)-1, d: +s.slice(6,8) }; }
function fromYmd(s) { const p = ymdParts(s); return new Date(p.y, p.m, p.d); }
function hrToHm(s) { return s ? `${s.slice(0,2)}:${s.slice(2,4)}` : ''; }
function hmToHr(hm) { return hm.replace(':', ''); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function addMonths(d, n) { const r = new Date(d); r.setMonth(r.getMonth()+n); return r; }
function addWeeks(d, n) { return addDays(d, n*7); }
function sameDate(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function startOfWeek(d) { const r = new Date(d); r.setDate(r.getDate() - r.getDay()); return r; }
function dowKor(n) { return ['일','월','화','수','목','금','토'][n]; }
function deptCls(d) { if(!d) return 'dept-all'; const x = DEPTS.find(y=>y.code===d); return x?x.cls:'dept-all'; }
function userName(id) { const u = USERS.find(u=>u.id===id); return u?u.name:id; }
function userDeptCode(id) { const u = USERS.find(u=>u.id===id); return u?u.dept:null; }
function userInitial(id) { const u = USERS.find(u=>u.id===id); return u?u.initial:'?'; }
function deptName(code) { if(!code) return '전체공개'; const d=DEPTS.find(x=>x.code===code); return d?d.name:code; }

function eventClasses(ev) {
  if (ev.cat === 'vacation') return { cls: 'cat-vacation' };
  return { cls: deptCls(ev.dept) };
}

function rangeOverlapsDay(s, dy) { return s.start <= dy && dy <= s.end; }

function passesFilter(s) {
  if (!state.catFilters.has(s.cat)) return false;
  if (state.deptFilters.size > 0) {
    if (s.cat === 'schedule' && !state.deptFilters.has(s.dept || '_NULL_')) return false;
  }
  if (state.mineOnly) {
    const mine = s.user === ME || (s.attendees && s.attendees.includes(ME));
    if (!mine) return false;
  }
  return true;
}

function getSchedulesForDay(dy) {
  return schedules.filter(s => rangeOverlapsDay(s, dy) && passesFilter(s));
}
function sortByTime(arr) {
  return arr.slice().sort((a,b) => {
    if (a.allday !== b.allday) return a.allday ? -1 : 1;
    return (a.startHr || '0000').localeCompare(b.startHr || '0000');
  });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =============================================
   Title (뷰별 다름 + 중앙 정렬은 CSS로)
   ============================================= */
function renderTitle() {
  const t = document.getElementById('calTitle');
  const d = state.current;
  const y = d.getFullYear(), m = d.getMonth() + 1;
  if (state.view === 'month') t.innerHTML = `${y}년 ${m}월`;
  else if (state.view === 'list') {
    const day = d.getDate();
    t.innerHTML = `${m}월 ${day}일 (${dowKor(d.getDay())}) <small>다가오는 일정</small>`;
  }
  else if (state.view === 'week') {
    const sun = startOfWeek(d); const sat = addDays(sun, 6);
    const sameMonth = sun.getMonth() === sat.getMonth();
    if (sameMonth) t.innerHTML = `${m}월 ${sun.getDate()}일 – ${sat.getDate()}일 <small>${y}</small>`;
    else t.innerHTML = `${sun.getMonth()+1}/${sun.getDate()} – ${sat.getMonth()+1}/${sat.getDate()} <small>${y}</small>`;
  } else if (state.view === 'day') t.innerHTML = `${m}월 ${d.getDate()}일 (${dowKor(d.getDay())}) <small>${y}</small>`;

  // 목록뷰일 때 ‹ › 숨김
  const isList = state.view === 'list';
  document.getElementById('navPrev').classList.toggle('hidden', isList);
  document.getElementById('navNext').classList.toggle('hidden', isList);
}

/* =============================================
   Month View — 멀티데이 종일 이어지는 바
   ============================================= */
function renderMonth() {
  const body = document.getElementById('calBody');
  const d = state.current;
  const y = d.getFullYear(), m = d.getMonth();
  const todayYmd = ymd(TODAY);
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();

  // 셀 배열
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push({ date: new Date(y, m, -startDow + i + 1), other: true });
  for (let i = 1; i <= daysInMonth; i++) cells.push({ date: new Date(y, m, i), other: false });
  while (cells.length % 7 !== 0) cells.push({ date: addDays(cells[cells.length-1].date, 1), other: true });

  // 주별로 나누기
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));

  let html = `<div class="cal-month">
    <div class="month-dow-row">
      <div class="month-dow sun">일</div><div class="month-dow">월</div><div class="month-dow">화</div><div class="month-dow">수</div><div class="month-dow">목</div><div class="month-dow">금</div><div class="month-dow sat">토</div>
    </div>
    <div class="month-grid" style="grid-template-rows: repeat(${weeks.length}, 1fr);">`;

  // 각 주별로 렌더링
  for (const week of weeks) {
    // 그 주에 걸치는 멀티데이(2일+) 종일 일정 모으기
    const weekStart = ymd(week[0].date), weekEnd = ymd(week[6].date);
    const multiAlldays = schedules.filter(s =>
      s.allday && passesFilter(s) && s.start <= weekEnd && s.end >= weekStart && s.start !== s.end
    );
    // 같은 일정의 주 내 위치 계산 (lane 배치)
    const lanes = [];  // lanes[laneIdx] = [{sn, startCol, endCol}, ...]
    const itemLanes = {};  // sn -> laneIdx
    for (const s of multiAlldays) {
      const sStart = fromYmd(s.start), sEnd = fromYmd(s.end);
      let startCol = 0, endCol = 6;
      for (let i = 0; i < 7; i++) {
        if (sameDate(week[i].date, sStart) || week[i].date > sStart) {
          startCol = i; break;
        }
        if (i === 6 && week[i].date < sStart) startCol = -1;
      }
      if (startCol === -1) startCol = 0;
      if (sStart > week[0].date && sStart <= week[6].date) {
        for (let i = 0; i < 7; i++) if (sameDate(week[i].date, sStart)) { startCol = i; break; }
      } else if (sStart < week[0].date) startCol = 0;

      for (let i = 6; i >= 0; i--) {
        if (sameDate(week[i].date, sEnd) || week[i].date <= sEnd) { endCol = i; break; }
      }
      if (sEnd > week[6].date) endCol = 6;

      // 빈 lane 찾기
      let laneIdx = 0;
      while (true) {
        if (!lanes[laneIdx]) lanes[laneIdx] = [];
        const conflict = lanes[laneIdx].some(o => !(o.endCol < startCol || o.startCol > endCol));
        if (!conflict) {
          lanes[laneIdx].push({ sn: s.sn, startCol, endCol, s });
          itemLanes[s.sn] = { laneIdx, startCol, endCol, s };
          break;
        }
        laneIdx++;
        if (laneIdx > 5) break;
      }
    }
    const totalLanes = lanes.length;
    const laneH = 20;  // 한 lane 높이
    const laneTop = 28;  // day-num 아래부터 시작

    html += `<div class="month-week" style="position: relative;">`;

    // 셀 렌더
    week.forEach((cell, di) => {
      const dy2 = ymd(cell.date);
      const items = sortByTime(getSchedulesForDay(dy2));
      // 멀티데이는 제외 (별도 lane으로 배치)
      const singleItems = items.filter(i => !(i.allday && i.start !== i.end));
      const visible = singleItems.slice(0, Math.max(1, 3 - totalLanes));
      const overflow = items.length - visible.length - (totalLanes > 0 ? Object.values(itemLanes).filter(x => x.startCol <= di && x.endCol >= di).length : 0);
      const isToday = dy2 === todayYmd;
      const dow = cell.date.getDay();
      const dowCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';

      html += `<div class="month-cell ${cell.other ? 'other' : ''} ${isToday ? 'today' : ''}" data-ymd="${dy2}" data-empty="1">`;
      html += `<div class="day-num-wrap"><span class="day-num ${dowCls}">${cell.date.getDate()}</span></div>`;
      // 멀티데이 lane 만큼 공간 확보
      if (totalLanes > 0) html += `<div style="height: ${totalLanes * laneH}px;"></div>`;
      // 단일 일정
      for (const ev of visible) {
        const { cls } = eventClasses(ev);
        if (ev.allday) {
          html += `<div class="ev allday ${cls}" data-sn="${ev.sn}"><span class="ev-title">${escapeHtml(ev.title)}</span></div>`;
        } else {
          html += `<div class="ev timed ${cls}" data-sn="${ev.sn}">
            <span class="ev-dot"></span><span class="ev-time">${hrToHm(ev.startHr)}</span><span class="ev-title">${escapeHtml(ev.title)}</span>
          </div>`;
        }
      }
      if (overflow > 0) html += `<div class="ev-more" data-overflow="${dy2}">+${overflow}개 더</div>`;
      html += `</div>`;
    });

    // 멀티데이 바 (절대 위치)
    Object.values(itemLanes).forEach(({ laneIdx, startCol, endCol, s }) => {
      const sStart = fromYmd(s.start), sEnd = fromYmd(s.end);
      const continuesLeft = sStart < week[0].date;
      const continuesRight = sEnd > week[6].date;
      const { cls } = eventClasses(s);
      const widthPct = ((endCol - startCol + 1) / 7) * 100;
      const leftPct = (startCol / 7) * 100;
      const topPx = laneTop + laneIdx * laneH;
      html += `<div class="ev allday multiday ${cls} ${continuesLeft?'continues-left':''} ${continuesRight?'continues-right':''}"
        data-sn="${s.sn}"
        style="left: calc(${leftPct}% + 3px); width: calc(${widthPct}% - 6px); top: ${topPx}px;">
        <span class="ev-title">${escapeHtml(s.title)}${continuesRight && !continuesLeft ? ' →' : ''}</span>
      </div>`;
    });

    html += `</div>`;
  }

  html += `</div></div>`;
  body.innerHTML = html;
}

/* =============================================
   Week View
   ============================================= */
function renderWeek() {
  const body = document.getElementById('calBody');
  const sun = startOfWeek(state.current);
  const days = Array.from({length: 7}, (_, i) => addDays(sun, i));
  const todayYmd = ymd(TODAY);

  let html = '<div class="cal-week">';
  html += '<div class="week-head"><div class="week-head-time"></div>';
  for (const d of days) {
    const dy = ymd(d), dow = d.getDay();
    const dowCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    const todayCls = dy === todayYmd ? 'today' : '';
    html += `<div class="week-head-col ${dowCls} ${todayCls}" data-ymd="${dy}" data-empty="1">
      <div class="dow">${dowKor(dow)}</div><div class="num">${d.getDate()}</div>
    </div>`;
  }
  html += '</div>';

  // 종일 (멀티데이도 처리)
  const alldayItems = schedules.filter(s =>
    s.allday && passesFilter(s) && s.start <= ymd(days[6]) && s.end >= ymd(days[0])
  );
  // lane 배치
  const lanes = [];
  const itemLanes = {};
  for (const s of alldayItems) {
    const sStart = fromYmd(s.start), sEnd = fromYmd(s.end);
    let startCol = 0, endCol = 6;
    for (let i = 0; i < 7; i++) if (sameDate(days[i], sStart) || days[i] > sStart) { startCol = i; break; }
    if (sStart < days[0]) startCol = 0;
    for (let i = 6; i >= 0; i--) if (sameDate(days[i], sEnd) || days[i] <= sEnd) { endCol = i; break; }
    if (sEnd > days[6]) endCol = 6;
    let laneIdx = 0;
    while (true) {
      if (!lanes[laneIdx]) lanes[laneIdx] = [];
      const conflict = lanes[laneIdx].some(o => !(o.endCol < startCol || o.startCol > endCol));
      if (!conflict) {
        lanes[laneIdx].push({ sn: s.sn, startCol, endCol });
        itemLanes[s.sn] = { laneIdx, startCol, endCol, s };
        break;
      }
      laneIdx++;
      if (laneIdx > 5) break;
    }
  }
  const totalLanes = Math.max(1, lanes.length);
  html += `<div class="week-allday" style="min-height: ${36 + (totalLanes-1)*22}px;">`;
  html += `<div class="week-allday-label">종일</div>`;
  html += `<div class="week-allday-grid">`;
  for (let i = 0; i < 7; i++) {
    const dy = ymd(days[i]);
    html += `<div class="week-allday-cell" data-ymd="${dy}" data-empty="1"></div>`;
  }
  // 절대 위치 종일 바
  Object.values(itemLanes).forEach(({ laneIdx, startCol, endCol, s }) => {
    const sStart = fromYmd(s.start), sEnd = fromYmd(s.end);
    const continuesLeft = sStart < days[0];
    const continuesRight = sEnd > days[6];
    const { cls } = eventClasses(s);
    const widthPct = ((endCol - startCol + 1) / 7) * 100;
    const leftPct = (startCol / 7) * 100;
    html += `<div class="ev allday multiday ${cls} ${continuesLeft?'continues-left':''} ${continuesRight?'continues-right':''}"
      data-sn="${s.sn}"
      style="position:absolute; left: ${leftPct}%; width: ${widthPct}%; top: ${4 + laneIdx * 22}px; height: 18px;">
      <span class="ev-title">${escapeHtml(s.title)}</span>
    </div>`;
  });
  html += `</div></div>`;

  const HOUR_START = 7, HOUR_END = 21, HOUR_PX = 48;
  html += '<div class="week-timeline"><div class="week-timeline-inner">';
  for (let h = HOUR_START; h <= HOUR_END; h++) {
    html += `<div class="week-time-label">${pad(h)}:00</div>`;
    for (const d of days) {
      const dy = ymd(d), todayCls = dy === todayYmd ? 'today' : '';
      html += `<div class="week-time-col ${todayCls}" data-ymd="${dy}" data-hr="${pad(h)}00" data-empty="1"><div class="week-time-cell"></div></div>`;
    }
  }
  html += '</div>';

  html += '<div style="position:absolute;top:0;left:0;right:0;height:100%;pointer-events:none;"><div class="week-timeline-inner" style="height:100%;"><div></div>';
  for (const d of days) {
    const dy = ymd(d);
    const items = getSchedulesForDay(dy).filter(e => !e.allday);
    html += '<div style="position:relative;pointer-events:none;">';
    for (const ev of items) {
      const sh = +ev.startHr.slice(0,2), sm = +ev.startHr.slice(2,4);
      const eh = +ev.endHr.slice(0,2), em = +ev.endHr.slice(2,4);
      const top = Math.max(0, ((sh - HOUR_START) + sm/60) * HOUR_PX);
      const height = Math.max(22, ((eh - sh) + (em - sm)/60) * HOUR_PX);
      const { cls } = eventClasses(ev);
      html += `<div class="te ${cls}" data-sn="${ev.sn}" style="top:${top}px;height:${height}px;pointer-events:auto;">
        <div class="te-title">${escapeHtml(ev.title)}</div>
        <div class="te-time">${hrToHm(ev.startHr)} – ${hrToHm(ev.endHr)}</div>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div></div>';

  if (days.some(d => sameDate(d, TODAY))) {
    const top = (NOW_HOUR - HOUR_START + NOW_MIN/60) * HOUR_PX;
    if (top >= 0 && top <= (HOUR_END - HOUR_START + 1) * HOUR_PX)
      html += `<div class="now-line" style="top:${top}px;"></div>`;
  }
  html += '</div></div>';
  body.innerHTML = html;
  setTimeout(() => {
    const tl = body.querySelector('.week-timeline');
    if (tl) tl.scrollTop = Math.max(0, (NOW_HOUR - HOUR_START - 2) * HOUR_PX);
  }, 0);
}

/* =============================================
   Day View
   ============================================= */
function renderDay() {
  const body = document.getElementById('calBody');
  const d = state.current;
  const dy = ymd(d), todayYmd = ymd(TODAY), isToday = dy === todayYmd;
  const items = sortByTime(getSchedulesForDay(dy));
  const allday = items.filter(e => e.allday);
  const timed = items.filter(e => !e.allday);
  const HOUR_START = 7, HOUR_END = 21, HOUR_PX = 60;

  let html = `<div class="cal-day">
    <div class="day-allday">
      <div class="day-allday-label">종일 ${allday.length > 0 ? '· ' + allday.length + '건' : ''}</div>`;
  if (allday.length === 0) {
    html += `<div class="day-allday-empty">종일 일정이 없습니다</div>`;
  } else {
    for (const ev of allday) {
      const { cls } = eventClasses(ev);
      const range = (ev.start !== ev.end) ? `<span class="ev-meta-sm">${ev.start.slice(4,6)}/${ev.start.slice(6,8)} – ${ev.end.slice(4,6)}/${ev.end.slice(6,8)}</span>` : '';
      html += `<div class="ev allday ${cls}" data-sn="${ev.sn}">
        <span class="ev-title">${escapeHtml(ev.title)}</span>${range}
      </div>`;
    }
  }
  html += `</div>`;

  html += '<div class="day-timeline"><div class="day-timeline-inner">';
  for (let h = HOUR_START; h <= HOUR_END; h++) {
    html += `<div class="day-time-label">${pad(h)}:00</div>`;
    html += `<div class="day-time-col" data-ymd="${dy}" data-hr="${pad(h)}00" data-empty="1"><div class="day-time-cell"></div></div>`;
  }
  html += '</div>';

  html += '<div style="position:absolute;top:0;left:0;right:0;height:100%;pointer-events:none;display:grid;grid-template-columns:64px 1fr;"><div></div><div style="position:relative;">';
  for (const ev of timed) {
    const sh = +ev.startHr.slice(0,2), sm = +ev.startHr.slice(2,4);
    const eh = +ev.endHr.slice(0,2), em = +ev.endHr.slice(2,4);
    const top = Math.max(0, ((sh - HOUR_START) + sm/60) * HOUR_PX);
    const height = Math.max(28, ((eh - sh) + (em - sm)/60) * HOUR_PX);
    const { cls } = eventClasses(ev);
    const meta = (ev.attendees && ev.attendees.length > 0)
      ? `<div class="te-meta">참석자 ${ev.attendees.length}명${ev.place ? ' · ' + escapeHtml(ev.place) : ''}</div>`
      : (ev.place ? `<div class="te-meta">${escapeHtml(ev.place)}</div>` : '');
    html += `<div class="te ${cls}" data-sn="${ev.sn}" style="top:${top}px;height:${height}px;pointer-events:auto;">
      <div class="te-title">${escapeHtml(ev.title)}</div>
      <div class="te-time">${hrToHm(ev.startHr)} – ${hrToHm(ev.endHr)}</div>
      ${height > 50 ? meta : ''}
    </div>`;
  }
  html += '</div></div>';

  if (isToday) {
    const top = (NOW_HOUR - HOUR_START + NOW_MIN/60) * HOUR_PX;
    if (top >= 0 && top <= (HOUR_END - HOUR_START + 1) * HOUR_PX)
      html += `<div class="day-now-line" style="top:${top}px;"></div>`;
  }
  html += '</div></div>';
  body.innerHTML = html;
  setTimeout(() => {
    const tl = body.querySelector('.day-timeline');
    if (tl) tl.scrollTop = Math.max(0, (NOW_HOUR - HOUR_START - 2) * HOUR_PX);
  }, 0);
}

/* =============================================
   List View — 오늘/내일/날짜 라벨 + 그리드 들여쓰기
   ============================================= */
function renderList() {
  const body = document.getElementById('calBody');
  const todayYmd = ymd(TODAY);
  const tomorrowYmd = ymd(addDays(TODAY, 1));

  const days = [];
  for (let i = 0; i < state.listLimit; i++) {
    const d = addDays(TODAY, i);
    const dy = ymd(d);
    const items = sortByTime(getSchedulesForDay(dy));
    if (items.length > 0) days.push({ date: d, dy, items });
  }

  let html = `<div class="cal-list">`;
  if (days.length === 0) {
    html += `<div class="list-empty">앞으로 ${state.listLimit}일간 일정이 없습니다.</div>`;
  } else {
    for (const day of days) {
      const dow = day.date.getDay();
      const isToday = day.dy === todayYmd;
      const isTomorrow = day.dy === tomorrowYmd;
      let lblMain, lblSub;
      if (isToday) { lblMain = '오늘'; lblSub = `${day.date.getMonth()+1}/${day.date.getDate()} ${dowKor(dow)}`; }
      else if (isTomorrow) { lblMain = '내일'; lblSub = `${day.date.getMonth()+1}/${day.date.getDate()} ${dowKor(dow)}`; }
      else { lblMain = `${day.date.getMonth()+1}/${day.date.getDate()}`; lblSub = `${dowKor(dow)}요일`; }
      const dowClass = dow === 0 ? 'weekend-sun' : dow === 6 ? 'weekend-sat' : '';
      html += `<div class="list-day-block">
        <div class="list-day-label ${isToday ? 'today' : ''} ${dowClass}">
          <span class="lbl-main">${lblMain}</span>
          <span class="lbl-sub">${lblSub}</span>
        </div>
        <div class="list-day-items">`;
      for (const ev of day.items) {
        const { cls } = eventClasses(ev);
        const timeCol = ev.allday
          ? `<div class="list-row-time allday">종일</div>`
          : `<div class="list-row-time">${hrToHm(ev.startHr)}<small>${hrToHm(ev.endHr)}</small></div>`;
        const range = (ev.start !== ev.end) ? ` · ${ev.start.slice(4,6)}/${ev.start.slice(6,8)} – ${ev.end.slice(4,6)}/${ev.end.slice(6,8)}` : '';
        const dn = ev.dept ? deptName(ev.dept) : '전체공개';
        const attd = (ev.attendees && ev.attendees.length > 0)
          ? `<div class="list-row-attd"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${ev.attendees.length}</div>`
          : '<div></div>';
        html += `<div class="list-row ${cls}" data-sn="${ev.sn}">
          ${timeCol}
          <div>
            <div class="list-row-title">${escapeHtml(ev.title)}</div>
            <div class="list-row-meta">
              <span class="dept-tag ${cls}">${ev.cat === 'vacation' ? '휴가' : dn}</span>
              ${escapeHtml(userName(ev.user))}${ev.place ? ' · ' + escapeHtml(ev.place) : ''}${range}
            </div>
          </div>
          ${attd}
        </div>`;
      }
      html += `</div></div>`;
    }
    html += `<button class="list-loadmore" id="listLoadMore">
      <svg viewBox="0 0 24 24" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      15일 더 보기 (현재 ${state.listLimit}일)
    </button>`;
  }
  html += `</div>`;
  body.innerHTML = html;

  const lm = document.getElementById('listLoadMore');
  if (lm) lm.addEventListener('click', () => {
    state.listLimit += 15;
    renderList();
    showToast(`${state.listLimit}일치 표시 중`);
  });
}

/* =============================================
   LP — 미니 월력 + 일정 영역
   ============================================= */
function renderLpMini() {
  const grid = document.getElementById('lpMiniGrid');
  const title = document.getElementById('lpMiniTitle');
  const cur = state.lpCurrent;
  const y = cur.getFullYear(), m = cur.getMonth();
  title.textContent = `${y}년 ${m+1}월`;

  const startDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayYmd = ymd(TODAY);
  const selectedYmd = ymd(state.lpSelectedDate);

  let html = '';
  // 이전 달 채우기
  const prevLastDay = new Date(y, m, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    const d = prevLastDay - i;
    const dt = new Date(y, m - 1, d);
    const dow = dt.getDay();
    const dowCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    html += `<div class="lp-mini-day other ${dowCls}" data-ymd="${ymd(dt)}">${d}</div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(y, m, d);
    const dy = ymd(dt);
    const dow = dt.getDay();
    const dowCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    let classes = `lp-mini-day ${dowCls}`;
    if (dy === todayYmd) classes += ' today';
    if (dy === selectedYmd && dy !== todayYmd) classes += ' selected';

    // 도트
    const items = getSchedulesForDay(dy);
    const deptSet = [...new Set(items.map(x => x.cat === 'vacation' ? 'VAC' : (x.dept || 'ALL')))].slice(0, 3);
    const dots = deptSet.map(c => {
      let color;
      if (c === 'VAC') color = 'var(--vacation)';
      else {
        const d2 = DEPTS.find(x => x.code === c);
        color = d2 ? `var(--${d2.cls})` : 'var(--dept-all)';
      }
      return `<span class="dot" style="background:${color}"></span>`;
    }).join('');

    html += `<div class="${classes}" data-ymd="${dy}">
      ${d}
      ${dots ? `<span class="dots">${dots}</span>` : ''}
    </div>`;
  }
  // 다음 달 채우기
  const totalCells = startDow + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    const dt = new Date(y, m + 1, i);
    const dow = dt.getDay();
    const dowCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    html += `<div class="lp-mini-day other ${dowCls}" data-ymd="${ymd(dt)}">${i}</div>`;
  }
  grid.innerHTML = html;
}

function renderLpEvents() {
  const title = document.getElementById('lpEventsTitle');
  const sub = document.getElementById('lpEventsSub');
  const list = document.getElementById('lpEventsList');

  const selected = state.lpSelectedDate;
  const selectedYmd = ymd(selected);
  const isToday = selectedYmd === ymd(TODAY);

  // 라벨
  if (isToday) {
    title.textContent = '오늘 일정';
    sub.textContent = `${selected.getMonth()+1}/${selected.getDate()} ${dowKor(selected.getDay())}`;
  } else {
    title.textContent = `${selected.getMonth()+1}월 ${selected.getDate()}일`;
    sub.textContent = `${dowKor(selected.getDay())}요일`;
  }

  // 일정 데이터
  const dayItems = sortByTime(getSchedulesForDay(selectedYmd));

  // 오늘이고 일정이 비었으면 → 다가오는 일정 추가
  let upcomingDays = [];
  if (isToday && dayItems.length === 0) {
    for (let i = 1; i <= 14; i++) {
      const d = addDays(TODAY, i);
      const dy = ymd(d);
      const items = sortByTime(getSchedulesForDay(dy));
      if (items.length > 0) {
        upcomingDays.push({ date: d, dy, items });
        if (upcomingDays.length >= 3) break;
      }
    }
  }

  let html = '';
  if (dayItems.length > 0) {
    for (const ev of dayItems) {
      html += renderLpEventRow(ev);
    }
  } else if (upcomingDays.length > 0) {
    html += `<div class="lp-empty" style="padding:8px 4px; text-align:left; font-size:11.5px;">오늘 일정이 없습니다. 다가오는 일정:</div>`;
    for (const ud of upcomingDays) {
      const lblTxt = sameDate(ud.date, addDays(TODAY, 1)) ? '내일' : `${ud.date.getMonth()+1}/${ud.date.getDate()} ${dowKor(ud.date.getDay())}`;
      html += `<div class="lp-day-group">
        <div class="lp-day-group-label">
          <span class="num">${lblTxt}</span>
        </div>`;
      for (const ev of ud.items) html += renderLpEventRow(ev);
      html += `</div>`;
    }
  } else {
    html += `<div class="lp-empty">일정이 없습니다</div>`;
  }

  // 마지막에 빠른 추가 카드
  html += `<div class="lp-quick-card" id="lpQuickAddCard">
    <svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    빠른 일정 추가
  </div>`;

  list.innerHTML = html;
}

function renderLpEventRow(ev) {
  const { cls } = eventClasses(ev);
  const timeHtml = ev.allday
    ? `<div class="lp-event-time allday">종일</div>`
    : `<div class="lp-event-time">${hrToHm(ev.startHr)}<small>${hrToHm(ev.endHr)}</small></div>`;
  const place = ev.place ? ' · ' + ev.place : '';
  const dn = ev.dept ? deptName(ev.dept) : '전체공개';
  const label = ev.cat === 'vacation' ? '휴가' : dn;
  return `<div class="lp-event" data-sn="${ev.sn}" style="border-left-color: var(--${cls});">
    ${timeHtml}
    <div class="lp-event-body">
      <div class="lp-event-title">${escapeHtml(ev.title)}</div>
      <div class="lp-event-meta">${label}${place}</div>
    </div>
  </div>`;
}

/* =============================================
   Modal — 단일 컬럼
   ============================================= */
function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.addEventListener('keydown', escListener);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.removeEventListener('keydown', escListener);
}
function escListener(e) { if (e.key === 'Escape') closeModal(); }
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') closeModal();
});

function bindCreateModal() {
  const alldayEl = document.getElementById('f_allday');
  alldayEl.addEventListener('click', () => {
    alldayEl.classList.toggle('on');
    modalState.allday = alldayEl.classList.contains('on');
    document.getElementById('f_start_pair').classList.toggle('allday', modalState.allday);
    document.getElementById('f_end_pair').classList.toggle('allday', modalState.allday);
  });
  const loopEl = document.getElementById('f_loop');
  loopEl.addEventListener('click', () => {
    loopEl.classList.toggle('on');
    modalState.loopYn = loopEl.classList.contains('on');
    document.getElementById('f_loop_chips').style.display = modalState.loopYn ? 'inline-flex' : 'none';
    renderMiniCal();
  });
  document.querySelectorAll('#f_loop_chips .loop-chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('#f_loop_chips .loop-chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      modalState.loopType = c.dataset.loop;
      renderMiniCal();
    });
  });
  document.querySelectorAll('#f_dept .dept-option').forEach(d => {
    d.addEventListener('click', () => {
      document.querySelectorAll('#f_dept .dept-option').forEach(x => x.classList.remove('active'));
      d.classList.add('active');
      modalState.deptCd = d.dataset.code;
    });
  });
  document.getElementById('f_start_date').addEventListener('change', e => {
    modalState.startYmd = e.target.value.replace(/-/g, '');
    if (modalState.endYmd < modalState.startYmd) {
      modalState.endYmd = modalState.startYmd;
      document.getElementById('f_end_date').value = ymdToInputDate(modalState.endYmd);
    }
    renderMiniCal();
    applyTodayMinTime();
  });
  document.getElementById('f_end_date').addEventListener('change', e => {
    modalState.endYmd = e.target.value.replace(/-/g, '');
    renderMiniCal();
  });
  document.getElementById('f_start_time').addEventListener('change', e => {
    modalState.startHr = hmToHr(e.target.value);
  });
  document.getElementById('f_end_time').addEventListener('change', e => {
    modalState.endHr = hmToHr(e.target.value);
  });
  // 미니캘 토글
  const mcToggle = document.getElementById('mcToggle');
  const mcWrap = document.getElementById('mcWrap');
  mcToggle.addEventListener('click', () => {
    const open = mcWrap.classList.toggle('open');
    mcToggle.classList.toggle('open', open);
    if (open) renderMiniCal();
  });
  // 미니캘 nav
  document.getElementById('mc_prev').addEventListener('click', () => {
    if (modalState.miniMonth.m === 0) { modalState.miniMonth.y--; modalState.miniMonth.m = 11; }
    else modalState.miniMonth.m--;
    renderMiniCal();
  });
  document.getElementById('mc_next').addEventListener('click', () => {
    if (modalState.miniMonth.m === 11) { modalState.miniMonth.y++; modalState.miniMonth.m = 0; }
    else modalState.miniMonth.m++;
    renderMiniCal();
  });
  // 참석자
  const searchEl = document.getElementById('f_attd_search');
  const dropdownEl = document.getElementById('f_attd_dropdown');
  searchEl.addEventListener('focus', () => renderAttdDropdown(searchEl.value));
  searchEl.addEventListener('input', () => renderAttdDropdown(searchEl.value));
  searchEl.addEventListener('blur', () => setTimeout(() => dropdownEl.classList.remove('open'), 150));
  document.getElementById('f_save').addEventListener('click', saveSchedule);
}

function renderAttdDropdown(query) {
  const dropdown = document.getElementById('f_attd_dropdown');
  const q = (query || '').toLowerCase();
  const filtered = USERS.filter(u =>
    u.name.toLowerCase().includes(q) || u.id.toLowerCase().includes(q)
  );
  let html = '';
  if (filtered.length === 0) {
    html = '<div style="padding:12px;color:var(--text-muted);font-size:12px;text-align:center;">결과 없음</div>';
  } else {
    for (const u of filtered) {
      const added = modalState.attendees.includes(u.id);
      const cls = deptCls(u.dept);
      html += `<div class="attd-dropdown-item ${cls} ${added ? 'added' : ''}" data-uid="${u.id}">
        <span class="attd-avatar">${u.initial}</span>
        <div class="attd-info">
          <div class="attd-name">${u.name}</div>
          <div class="attd-dept-sub">${deptName(u.dept)}</div>
        </div>
        ${added ? '<span style="font-size:11px;color:var(--text-muted);">추가됨</span>' : ''}

    }
  }
  dropdown.innerHTML = html;
  dropdown.classList.add('open');
  dropdown.querySelectorAll('.attd-dropdown-item:not(.added)').forEach(el => {
    el.addEventListener('click', () => {
      modalState.attendees.push(el.dataset.uid);
      renderSelectedAttd();
      renderAttdDropdown(document.getElementById('f_attd_search').value);
    });
  });
}

function renderMiniCal() {
  const wrap = document.getElementById('mcWrap');
  if (!wrap || !wrap.classList.contains('open')) return;
  const { y, m } = modalState.miniMonth;
  document.getElementById('mc_title').textContent = `${y}년 ${m+1}월`;
  const grid = document.getElementById('mc_grid');
  const startDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const todayYmd = ymd(TODAY);

  const loopDates = new Set();
  if (modalState.loopYn) {
    const base = fromYmd(modalState.startYmd);
    for (let i = 1; i <= 12; i++) {
      let next;
      if (modalState.loopType === 'DAY') next = addDays(base, i);
      else if (modalState.loopType === 'WEEK') next = addDays(base, i*7);
      else if (modalState.loopType === 'MONTH') next = new Date(base.getFullYear(), base.getMonth()+i, base.getDate());
      else next = new Date(base.getFullYear()+i, base.getMonth(), base.getDate());
      if (next.getFullYear() === y && next.getMonth() === m) loopDates.add(next.getDate());
    }
  }

  let html = '';
  for (let i = 0; i < startDow; i++) html += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(y, m, d);
    const dy = ymd(dt);
    const dow = dt.getDay();
    const dowCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    let classes = `mc-day ${dowCls}`;
    if (dy === todayYmd) classes += ' today';
    if (dy >= modalState.startYmd && dy <= modalState.endYmd) {
      if (dy === modalState.startYmd && dy === modalState.endYmd) classes += ' single-pick';
      else if (dy === modalState.startYmd) classes += ' in-range range-start';
      else if (dy === modalState.endYmd) classes += ' in-range range-end';
      else classes += ' in-range';
    } else if (loopDates.has(d)) classes += ' loop-preview';
    html += `<div class="${classes}" data-d="${d}">${d}</div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.mc-day').forEach(el => {
    el.addEventListener('click', () => {
      const day = +el.dataset.d;
      const newYmd = `${y}${pad(m+1)}${pad(day)}`;
      if (modalState.miniClickState === 'start') {
        modalState.startYmd = newYmd;
        modalState.endYmd = newYmd;
        document.getElementById('f_start_date').value = ymdToInputDate(newYmd);
        document.getElementById('f_end_date').value = ymdToInputDate(newYmd);
        modalState.miniClickState = 'end';
        document.getElementById('mc_hint').textContent = '한 번 더 클릭하면 종료일 지정';
      } else {
        if (newYmd >= modalState.startYmd) {
          modalState.endYmd = newYmd;
          document.getElementById('f_end_date').value = ymdToInputDate(newYmd);
        } else {
          modalState.startYmd = newYmd;
          document.getElementById('f_start_date').value = ymdToInputDate(newYmd);
        }
        modalState.miniClickState = 'start';
        document.getElementById('mc_hint').textContent = '날짜 클릭 = 시작 / 다시 클릭 = 종료';
      }
      renderMiniCal();
      applyTodayMinTime();
    });
  });
}

function applyTodayMinTime() {
  const startInput = document.getElementById('f_start_time');
  if (!startInput) return;
  if (modalState.startYmd === ymd(TODAY)) {
    const minHm = `${pad(NOW_HOUR)}:${pad(NOW_MIN <= 30 ? 30 : 0)}`;
    startInput.min = minHm;
    if (modalState.startHr < hmToHr(minHm)) {
      modalState.startHr = hmToHr(minHm);
      startInput.value = minHm;
    }
  } else {
    startInput.removeAttribute('min');
  }
}

function saveSchedule() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) { showToast('제목을 입력해주세요.'); return; }
  schedules.push({
    sn: nextSn++,
    title, cat: 'schedule',
    start: modalState.startYmd, end: modalState.endYmd,
    startHr: modalState.allday ? null : modalState.startHr,
    endHr: modalState.allday ? null : modalState.endHr,
    allday: modalState.allday,
    user: ME, dept: modalState.deptCd || null,
    attendees: modalState.attendees.slice(),
    note: document.getElementById('f_note').value.trim() || undefined,
    loopYn: modalState.loopYn,
    loopType: modalState.loopYn ? modalState.loopType : undefined,
  });
  closeModal();
  rerenderAll();
  showToast(`"${title}" 일정이 추가되었습니다.`);
}

function ymdToInputDate(y) { return `${y.slice(0,4)}-${y.slice(4,6)}-${y.slice(6,8)}`; }
function addHourToHr(hr, h) {
  const hh = +hr.slice(0,2), mm = +hr.slice(2,4);
  let total = hh*60 + mm + h*60;
  if (total >= 24*60) total = 23*60 + 30;
  return pad(Math.floor(total/60)) + pad(total%60);
}
function nextValidTime() {
  let h = NOW_HOUR, m = NOW_MIN;
  m = m <= 30 ? 30 : 60;
  if (m === 60) { m = 0; h += 1; }
  return pad(h) + pad(m);
}

function respondAttendance(sn, resp) {

  openDetailModal(sn);
  showToast(resp === 'yes' ? '참석으로 응답했습니다.' : '불참으로 응답했습니다.');
}
function deleteSchedule(sn) {
  if (!confirm('이 일정을 삭제하시겠습니까?')) return;
  schedules = schedules.filter(s => s.sn !== sn);
  closeModal();
  rerenderAll();

/* Overflow */
function showOverflow(dy, x, y) {
  const items = sortByTime(getSchedulesForDay(dy));
  const date = fromYmd(dy);
  const pop = document.getElementById('overflowPop');
  let html = `<div class="overflow-pop-title">${date.getMonth()+1}월 ${date.getDate()}일 (${dowKor(date.getDay())}) · ${items.length}건</div>`;
  for (const ev of items) {
    const { cls } = eventClasses(ev);
    if (ev.allday) html += `<div class="ev allday ${cls}" data-sn="${ev.sn}"><span class="ev-title">${escapeHtml(ev.title)}</span></div>`;
    else html += `<div class="ev timed ${cls}" data-sn="${ev.sn}">
      <span class="ev-dot"></span><span class="ev-time">${hrToHm(ev.startHr)}</span><span class="ev-title">${escapeHtml(ev.title)}</span>
    </div>`;
  }
  pop.innerHTML = html;
  pop.classList.add('open');
  const rect = pop.getBoundingClientRect();
  pop.style.left = Math.min(x, window.innerWidth - rect.width - 12) + 'px';
  pop.style.top = Math.min(y, window.innerHeight - rect.height - 12) + 'px';
  pop.onclick = e => {
    const evEl = e.target.closest('.ev');
    if (evEl) { hideOverflow(); openDetailModal(+evEl.dataset.sn); }
  };
}
function hideOverflow() { document.getElementById('overflowPop').classList.remove('open'); }

    case 'month': renderMonth(); break;
    case 'week': renderWeek(); break;
    case 'day': renderDay(); break;
    case 'list': renderList(); break;
  }
  renderLpMini();
  renderLpEvents();
  renderDeptPop();

}

function renderDeptPop() {
  const pop = document.getElementById('deptPop');
  let html = `<div class="dept-pop-item ${state.deptFilters.size === 0 ? 'checked' : ''}" data-code="_all">
    <span class="check"></span><span>전체 부서</span>
  </div><div class="dept-pop-divider"></div>`;
  for (const d of DEPTS) {
    const checked = state.deptFilters.has(d.code);
    html += `<div class="dept-pop-item ${checked ? 'checked' : ''}" data-code="${d.code}">
      <span class="check"></span><span class="cd" style="background:var(--${d.cls})"></span><span>${d.name}</span>
    </div>`;
  }
  html += `<div class="dept-pop-item ${state.deptFilters.has('_NULL_') ? 'checked' : ''}" data-code="_NULL_">
    <span class="check"></span><span class="cd" style="background:var(--dept-all)"></span><span>전체공개</span>
  </div>`;
  pop.innerHTML = html;
  pop.querySelectorAll('.dept-pop-item').forEach(el => {
    el.addEventListener('click', () => {
      const code = el.dataset.code;
      if (code === '_all') state.deptFilters.clear();
      else {
        if (state.deptFilters.has(code)) state.deptFilters.delete(code);
        else state.deptFilters.add(code);
      }
      rerenderAll();
    });
  });
}

  const c = document.getElementById('deptCount');
  if (state.deptFilters.size > 0) { c.style.display = 'inline-flex'; c.textContent = state.deptFilters.size; }

}

document.getElementById('catChips').addEventListener('click', e => {
  const c = e.target.closest('.cat-chip');
  if (!c || c.classList.contains('disabled')) return;
  const cat = c.dataset.cat;
  if (state.catFilters.has(cat)) state.catFilters.delete(cat);
  else state.catFilters.add(cat);
  c.classList.toggle('active', state.catFilters.has(cat));
  rerenderAll();
});
document.getElementById('mineSwitch').addEventListener('click', () => {
  const sw = document.getElementById('mineSwitch');
  sw.classList.toggle('on');
  state.mineOnly = sw.classList.contains('on');
  rerenderAll();
});

document.getElementById('addBtn').addEventListener('click', () => openCreateModal());
document.getElementById('mobileFab').addEventListener('click', () => openCreateModal());
document.getElementById('lpCloseBtn').addEventListener('click', () => {
  document.getElementById('app').classList.add('lp-closed');
  document.getElementById('demoLpToggle').textContent = 'LP 열기';
});

/* LP 미니캘 */
document.getElementById('lpMiniPrev').addEventListener('click', () => {
  state.lpCurrent = addMonths(state.lpCurrent, -1);
  renderLpMini();
});
document.getElementById('lpMiniNext').addEventListener('click', () => {
  state.lpCurrent = addMonths(state.lpCurrent, 1);
  renderLpMini();
});
document.getElementById('lpMiniGrid').addEventListener('click', e => {
  const d = e.target.closest('.lp-mini-day');
  if (!d) return;
  state.lpSelectedDate = fromYmd(d.dataset.ymd);
  renderLpMini();
  renderLpEvents();
});

/* LP 일정 / 빠른추가 */
document.getElementById('lpEventsList').addEventListener('click', e => {
  const quickEl = e.target.closest('#lpQuickAddCard');
  if (quickEl) { openCreateModal(ymd(state.lpSelectedDate)); return; }
  const evEl = e.target.closest('[data-sn]');
  if (evEl) openDetailModal(+evEl.dataset.sn);
});

/* 데모 */
document.getElementById('demoToday').addEventListener('click', () => {
  state.current = new Date(TODAY);
  state.listLimit = 15;
  state.lpCurrent = new Date(TODAY);
  state.lpSelectedDate = new Date(TODAY);
  rerenderAll();
});
document.getElementById('demoLpToggle').addEventListener('click', () => {
  const app = document.getElementById('app');
  app.classList.toggle('lp-closed');
  document.getElementById('demoLpToggle').textContent =
    app.classList.contains('lp-closed') ? 'LP 열기' : 'LP 닫기';
});
document.getElementById('demoDark').addEventListener('click', () => {
  document.body.classList.toggle('dark');
  document.getElementById('demoDark').classList.toggle('active', document.body.classList.contains('dark'));
});

/* Toast */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* Init */
rerenderAll();
setTimeout(() => showToast('v3: 헤더 중앙, 멀티데이 바, 단일 컬럼 모달, 빠른추가 인라인 카드'), 500);
</script>
</body>
