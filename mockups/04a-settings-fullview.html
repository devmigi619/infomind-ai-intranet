<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Infomind — 4a. 설정 (풀뷰)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  font-weight: 300;
  background: #F9F9F9;
  color: #000;
  min-width: 1280px;
  -webkit-font-smoothing: antialiased;
}
button, input { font-family: inherit; }
svg { stroke: currentColor; fill: none; }

/* ===== Layout ===== */
.app {
  display: grid;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}
.body {
  display: grid;
  grid-template-columns: 64px 1fr;
  height: calc(100vh - 48px);
  overflow: hidden;
}

/* ===== TopHeader ===== */
.top-header {
  display: flex;
  align-items: center;
  padding: 0 16px 0 20px;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  gap: 16px;
}
.brand {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: #000;
  user-select: none;
  flex-shrink: 0;
}
.search-bar {
  flex: 1;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  opacity: 0.5;
}
.search-bar input {
  width: 100%;
  height: 32px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 0 16px 0 40px;
  background: #F0F0F0;
  font-size: 13px;
  color: rgba(0,0,0,0.45);
  cursor: not-allowed;
  font-family: inherit;
}
.search-bar svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: rgba(0,0,0,0.3);
}
.search-bar .preparing-tag {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: rgba(0,0,0,0.35);
  letter-spacing: 0.04em;
}
.top-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.icon-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: rgba(0,0,0,0.6);
}
.icon-btn:hover { background: rgba(0,0,0,0.04); }
.icon-btn.active { color: #0A2463; background: rgba(10,36,99,0.08); }
.dot {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #EF4444;
}
.avatar-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  margin-left: 4px;
  padding: 4px 6px;
  border-radius: 8px;
  border: none;
  background: transparent;
}
.avatar-trigger:hover { background: rgba(0,0,0,0.04); }
.avatar-circle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(0,0,0,0.55);
  flex-shrink: 0;
}
.avatar-name {
  font-size: 13px;
  font-weight: 500;
  color: #000;
}

/* ===== NavRail ===== */
.nav-rail {
  background: #fff;
  border-right: 1px solid rgba(0,0,0,0.08);
  padding: 12px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
  overflow: hidden;
}
.nav-item {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  color: rgba(0,0,0,0.55);
  transition: all 0.15s;
}
.nav-item:hover { background: rgba(10,36,99,0.04); color: #0A2463; }
.nav-item.active { background: rgba(10,36,99,0.08); color: #0A2463; }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -8px;
  top: 12px;
  bottom: 12px;
  width: 2px;
  background: #0A2463;
  border-radius: 0 2px 2px 0;
}
.nav-divider {
  width: 32px;
  height: 1px;
  background: rgba(0,0,0,0.08);
  margin: 4px 0;
}

/* ===== Settings Main ===== */
.settings-main {
  display: flex;
  height: 100%;
  background: #fff;
  overflow: hidden;
}

/* Settings Sidebar */
.settings-sidebar {
  width: 220px;
  flex-shrink: 0;
  background: #FAFAFA;
  border-right: 1px solid rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  padding: 20px 0 16px;
}
.sidebar-category {
  display: flex;
  align-items: center;
  padding: 9px 20px;
  font-size: 14px;
  color: rgba(0,0,0,0.7);
  cursor: pointer;
  position: relative;
  transition: all 0.12s;
  border: none;
  background: transparent;
  text-align: left;
  width: 100%;
  font-family: inherit;
  font-weight: 300;
}
.sidebar-category:hover { background: rgba(0,0,0,0.04); color: #000; }
.sidebar-category.active {
  background: rgba(10,36,99,0.08);
  color: #0A2463;
  font-weight: 500;
}
.sidebar-category.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 6px;
  bottom: 6px;
  width: 3px;
  background: #0A2463;
  border-radius: 0 2px 2px 0;
}
.sidebar-footer {
  margin-top: auto;
  padding: 12px 20px;
  font-size: 11px;
  color: rgba(0,0,0,0.3);
}

/* Settings Content */
.settings-content {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
}
.settings-page-header {
  font-size: 28px;
  font-weight: 500;
  color: #000;
  margin-bottom: 32px;
  letter-spacing: -0.02em;
}
.settings-section-title {
  font-size: 18px;
  font-weight: 500;
  color: #000;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.settings-form {
  max-width: 600px;
}

/* Profile Avatar Row */
.profile-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}
.profile-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(0,0,0,0.35);
  flex-shrink: 0;
}
.profile-avatar-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.profile-avatar-name {
  font-size: 16px;
  font-weight: 500;
  color: #000;
}
.btn-text {
  font-size: 13px;
  color: #0A2463;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-family: inherit;
  font-weight: 400;
}
.btn-text:hover { text-decoration: underline; }

/* Form Fields */
.field-group {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 8px;
}
.field-row {
  display: flex;
  align-items: center;
  min-height: 44px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.field-row:last-child { border-bottom: none; }
.field-label {
  width: 108px;
  flex-shrink: 0;
  font-size: 13px;
  color: rgba(0,0,0,0.55);
  font-weight: 400;
}
.field-value {
  flex: 1;
  font-size: 13px;
  color: rgba(0,0,0,0.85);
}
.field-hint {
  font-size: 11px;
  color: rgba(0,0,0,0.3);
  flex-shrink: 0;
  margin-left: 16px;
}
.field-input {
  flex: 1;
  height: 36px;
  padding: 0 12px;
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 8px;
  background: #fff;
  font-size: 13px;
  color: #000;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}
.field-input:focus { border-color: #0A2463; box-shadow: 0 0 0 3px rgba(10,36,99,0.08); }
.field-input::placeholder { color: rgba(0,0,0,0.3); }

/* Divider */
.form-divider {
  height: 1px;
  background: rgba(0,0,0,0.06);
  margin: 24px 0;
}

/* Password Row */
.password-row {
  display: flex;
  align-items: center;
  min-height: 44px;
}
.password-dots {
  flex: 1;
  font-size: 20px;
  color: rgba(0,0,0,0.55);
  letter-spacing: 3px;
  line-height: 1;
}

/* Buttons */
.btn-primary {
  height: 32px;
  padding: 0 14px;
  background: #0A2463;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-primary:hover { background: #082052; }
.btn-secondary {
  height: 32px;
  padding: 0 14px;
  background: #fff;
  color: #000;
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 400;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: all 0.15s;
}
.btn-secondary:hover { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.2); }

.form-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 24px;
  gap: 8px;
}
</style>
</head>
<body>

<div class="app">

  <!-- ============ TopHeader ============ -->
  <header class="top-header">
    <div class="brand">Infomind</div>

    <div class="search-bar">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="통합검색 준비 중..." disabled />
      <span class="preparing-tag">준비 중</span>
    </div>

    <div class="top-actions">
      <button class="icon-btn" title="알림">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="dot"></span>
      </button>
      <button class="icon-btn" title="RightPanel 토글">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/></svg>
      </button>
      <button class="avatar-trigger">
        <div class="avatar-circle">
          <svg width="16" height="16" viewBox="0 0 24 24" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span class="avatar-name">관리자</span>
      </button>
    </div>
  </header>

  <!-- ============ Body ============ -->
  <div class="body">

    <!-- NavRail -->
    <nav class="nav-rail">
      <div class="nav-item active" title="홈">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V21H3z"/><path d="M9 21V12h6v9"/></svg>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item" title="게시판">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9h10M7 13h10M7 17h6"/></svg>
      </div>
      <div class="nav-item" title="전자결재">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 15l2 2 4-4"/></svg>
      </div>
      <div class="nav-item" title="주간보고">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h8M8 9h2"/></svg>
      </div>
      <div class="nav-item" title="캘린더">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </div>
    </nav>

    <!-- Settings Main (메인 콘텐츠 영역 전체 차지) -->
    <div class="settings-main">

      <!-- 사이드바 -->
      <aside class="settings-sidebar">
        <button class="sidebar-category active">계정</button>
        <button class="sidebar-category">알림</button>
        <button class="sidebar-category">맞춤설정</button>
        <button class="sidebar-category">화면</button>
        <div class="sidebar-footer">v0.0.1</div>
      </aside>

      <!-- 콘텐츠 -->
      <div class="settings-content">
        <div class="settings-page-header">설정</div>

        <div class="settings-form">
          <div class="settings-section-title">계정</div>

          <!-- 프로필 사진 -->
          <div class="profile-row">
            <div class="profile-avatar">
              <svg width="32" height="32" viewBox="0 0 24 24" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="profile-avatar-actions">
              <div class="profile-avatar-name">관리자</div>
              <button class="btn-text">사진 변경</button>
            </div>
          </div>

          <!-- Read-only 항목 -->
          <div class="field-group">
            <div class="field-row">
              <div class="field-label">이름</div>
              <div class="field-value">관리자</div>
              <div class="field-hint">관리자에게 문의</div>
            </div>
            <div class="field-row">
              <div class="field-label">부서</div>
              <div class="field-value">IT</div>
              <div class="field-hint">관리자에게 문의</div>
            </div>
            <div class="field-row">
              <div class="field-label">직급</div>
              <div class="field-value">관리자</div>
              <div class="field-hint">관리자에게 문의</div>
            </div>
          </div>

          <!-- 편집 가능 항목 -->
          <div class="field-group" style="margin-top: 16px;">
            <div class="field-row" style="gap: 12px;">
              <div class="field-label">이메일</div>
              <input class="field-input" type="email" value="admin@infomind.com" />
            </div>
            <div class="field-row" style="gap: 12px;">
              <div class="field-label">연락처</div>
              <input class="field-input" type="tel" placeholder="010-0000-0000" />
            </div>
          </div>

          <div class="form-divider"></div>

          <!-- 비밀번호 -->
          <div class="password-row">
            <div class="field-label">비밀번호</div>
            <div class="password-dots">••••••••</div>
            <button class="btn-secondary">변경하기</button>
          </div>

          <div class="form-actions">
            <button class="btn-secondary">취소</button>
            <button class="btn-primary">저장</button>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<script>
// 사이드바 카테고리 토글
document.querySelectorAll('.sidebar-category').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-category').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
// NavRail 토글
document.querySelectorAll('.nav-item').forEach((item) => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach((n) => n.classList.remove('active'));
    item.classList.add('active');
  });
});
</script>

</body>
</html>
